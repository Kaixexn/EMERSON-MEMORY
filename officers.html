<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>G-11 Emerson — Class Officers</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#050d1f;--navy2:#0a1830;--card:#091628;
  --gold:#c9973a;--goldB:#e8b84b;--goldP:#f0d080;--goldD:#7a5a1e;
  --white:#fff;--cream:#f0e6cc;--silver:#b8cce0;
}
html,body{background:var(--navy);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;overflow:hidden;}

/* STARS */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) var(--delay,0s) infinite ease-in-out;}
@keyframes twinkle{0%,100%{opacity:var(--min,.2);}50%{opacity:var(--max,.8);}}
.glow-bg{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(20,60,120,.55) 0%,transparent 70%),
    radial-gradient(ellipse 35% 28% at 20% 100%,rgba(201,151,58,.12) 0%,transparent 60%),
    radial-gradient(ellipse 35% 28% at 80% 100%,rgba(201,151,58,.1) 0%,transparent 60%);}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-30px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideInRight{from{opacity:0;transform:translateX(60px);}to{opacity:1;transform:translateX(0);}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-60px);}to{opacity:1;transform:translateX(0);}}
@keyframes pulse-glow{0%,100%{filter:drop-shadow(0 0 18px rgba(201,151,58,.3));}50%{filter:drop-shadow(0 0 42px rgba(201,151,58,.7));}}
@keyframes shimmer{0%{transform:translateX(-100%);}100%{transform:translateX(200%);}}
@keyframes toastPop{0%{opacity:0;transform:translateY(10px) scale(.9);}15%{opacity:1;transform:none;}80%{opacity:1;}100%{opacity:0;}}
@keyframes borderPulse{0%,100%{border-color:rgba(201,151,58,.35);}50%{border-color:rgba(201,151,58,.8);}}

/* LAYOUT */
.page{position:relative;z-index:1;width:100vw;height:100vh;display:flex;flex-direction:column;}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 32px 0;flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.logo-img{width:48px;height:48px;border-radius:50%;border:1.5px solid var(--gold);box-shadow:0 0 16px rgba(201,151,58,.35);}
.topbar-text .eyebrow{font-size:8px;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);}
.topbar-text .title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--cream);}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border:1px solid rgba(201,151,58,.3);background:rgba(201,151,58,.07);border-radius:4px;color:var(--goldP);font-size:9px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all .2s;}
.back-btn:hover{background:rgba(201,151,58,.18);border-color:var(--gold);}

/* SPOTLIGHT STAGE */
.stage{flex:1;display:flex;align-items:center;justify-content:center;gap:0;padding:20px 0;position:relative;overflow:hidden;}

/* AMBIENT GLOW behind photo */
.ambient{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(201,151,58,.12) 0%,transparent 70%);pointer-events:none;transition:opacity .5s;}

/* PHOTO FRAME */
.photo-stage{
  position:relative;
  width:min(300px, 38vw);
  height:min(520px, 65vw);
  flex-shrink:0;
}
@media(max-width:640px){
  .photo-stage{width:min(220px,68vw);height:min(380px,105vw);}
}
.photo-frame{
  width:100%;height:100%;
  border-radius:8px;
  border:2px solid rgba(201,151,58,.4);
  overflow:hidden;
  position:relative;
  background:var(--card);
  box-shadow:0 24px 80px rgba(0,0,0,.6),0 0 40px rgba(201,151,58,.1);
  animation:borderPulse 4s ease-in-out infinite;
}
.photo-frame img{width:100%;height:100%;object-fit:contain;display:block;position:absolute;inset:0;transform-origin:center center;transition:transform .08s ease;cursor:default;user-select:none;-webkit-user-select:none;-webkit-user-drag:none;}
.photo-frame img.dragging{cursor:grabbing;transition:none;}
.photo-pos-hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);z-index:15;background:rgba(5,13,31,.82);border:1px solid rgba(201,151,58,.4);border-radius:20px;padding:3px 12px;font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--goldP);pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;}
.edit-mode .photo-pos-hint{opacity:1;}
.photo-frame::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 55%,rgba(5,13,31,.65) 100%);pointer-events:none;}
.photo-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
.photo-placeholder-icon{font-size:48px;opacity:.25;}
.photo-placeholder-text{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(184,204,224,.3);}
.photo-shimmer{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.photo-shimmer::after{content:'';position:absolute;top:0;left:0;width:50%;height:100%;background:linear-gradient(105deg,transparent 40%,rgba(255,220,100,.05) 50%,transparent 60%);animation:shimmer 5s 1s infinite linear;}

/* UPLOAD OVERLAY (edit mode) */
.upload-overlay{
  position:absolute;inset:0;z-index:10;
  background:rgba(5,13,31,.7);
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:8px;
  cursor:pointer;border-radius:8px;
  transition:all .2s;
}
.upload-overlay:hover{background:rgba(5,13,31,.85);}
.upload-overlay span{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--goldP);}
.edit-mode .photo-frame:hover .upload-overlay{display:flex;}

/* INFO PANEL */
.info-panel{
  padding: 0 40px;
  min-width:220px;max-width:300px;
  display:flex;flex-direction:column;justify-content:center;gap:10px;
}
@media(max-width:700px){
  .stage{flex-direction:column;gap:16px;padding:10px 20px;}
  .info-panel{min-width:unset;max-width:100%;width:100%;padding:0 20px;text-align:center;align-items:center;}
}
.info-counter{font-size:9px;letter-spacing:.4em;text-transform:uppercase;color:var(--goldD);}
.info-divider{display:flex;align-items:center;gap:8px;width:100%;}
.info-divider::before,.info-divider::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(201,151,58,.4),transparent);}
.gem{width:5px;height:5px;background:var(--goldB);transform:rotate(45deg);box-shadow:0 0 5px var(--gold);flex-shrink:0;}
.info-position{
  display:inline-block;padding:4px 16px;
  border:1px solid rgba(201,151,58,.4);border-radius:100px;
  font-size:9px;letter-spacing:.25em;text-transform:uppercase;
  color:var(--gold);background:rgba(201,151,58,.08);
  outline:none;font-family:'DM Sans',sans-serif;cursor:default;
  max-width:100%;text-align:center;
}
.info-position[contenteditable="true"]{cursor:text;border-style:dashed;border-color:var(--gold);}
.info-name{
  font-family:'Playfair Display',serif;font-size:clamp(1.6rem,4vw,2.4rem);
  font-weight:900;line-height:1.1;
  background:linear-gradient(135deg,var(--goldP) 0%,var(--goldB) 40%,var(--gold) 70%,#a07020 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:pulse-glow 3s ease-in-out infinite;
  outline:none;cursor:default;
}
.info-name[contenteditable="true"]{cursor:text;}
.info-batch{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--silver);opacity:.6;}

/* DEL PHOTO BTN */
.del-photo-btn{
  position:absolute;top:8px;right:8px;z-index:12;
  width:24px;height:24px;border-radius:50%;border:none;
  background:rgba(200,40,40,.9);color:#fff;font-size:11px;
  cursor:pointer;display:none;align-items:center;justify-content:center;
}
.del-photo-btn:hover{background:rgb(230,40,40);}
.edit-mode .del-photo-btn{display:flex;}

/* DEL CARD BTN */
.del-card-btn{
  position:absolute;bottom:-36px;left:50%;transform:translateX(-50%);
  padding:4px 14px;border-radius:4px;border:1px solid rgba(200,40,40,.5);
  background:rgba(200,40,40,.15);color:#ff9090;font-size:9px;
  letter-spacing:.12em;text-transform:uppercase;cursor:pointer;
  display:none;white-space:nowrap;
  font-family:'DM Sans',sans-serif;transition:all .2s;
}
.del-card-btn:hover{background:rgba(200,40,40,.35);}
.edit-mode .del-card-btn.custom{display:block;}

/* ARROWS */
.arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  width:48px;height:48px;border-radius:50%;
  border:1px solid rgba(201,151,58,.35);background:rgba(9,22,40,.85);
  color:var(--gold);font-size:20px;cursor:pointer;z-index:20;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s cubic-bezier(.34,1.56,.64,1);
  backdrop-filter:blur(4px);
}
.arrow:hover{background:rgba(201,151,58,.2);border-color:var(--gold);transform:translateY(-50%) scale(1.1);}
.arrow:active{transform:translateY(-50%) scale(.95);}
.arrow.left{left:20px;}
.arrow.right{right:20px;}
@media(max-width:640px){
  .arrow{width:36px;height:36px;font-size:15px;}
  .arrow.left{left:8px;}
  .arrow.right{right:8px;}
}

/* DOTS */
.dots{display:flex;gap:7px;justify-content:center;padding-bottom:20px;flex-shrink:0;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(201,151,58,.25);cursor:pointer;transition:all .3s;}
.dot.active{background:var(--goldB);box-shadow:0 0 8px rgba(201,151,58,.6);transform:scale(1.3);}
.dot:hover{background:rgba(201,151,58,.6);}

/* EDIT CONTROLS */
.edit-toggle{position:fixed;bottom:22px;right:22px;z-index:500;width:44px;height:44px;border-radius:50%;border:1px solid rgba(201,151,58,.4);background:rgba(9,22,40,.92);color:var(--gold);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.4);transition:all .25s;}
.edit-toggle:hover{background:rgba(201,151,58,.18);border-color:var(--gold);}
.edit-toggle.active{background:rgba(201,151,58,.22);border-color:var(--goldB);color:var(--goldB);}
.save-btn{position:fixed;bottom:22px;right:76px;z-index:500;display:none;padding:10px 18px;border-radius:4px;border:1px solid rgba(201,151,58,.5);background:rgba(201,151,58,.15);color:var(--goldP);font-size:10px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.save-btn:hover{background:rgba(201,151,58,.3);}
.save-btn.visible{display:block;}
.add-btn{position:fixed;bottom:22px;left:22px;z-index:500;display:none;padding:10px 18px;border-radius:4px;border:1px solid rgba(201,151,58,.5);background:rgba(201,151,58,.15);color:var(--goldP);font-size:10px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.add-btn:hover{background:rgba(201,151,58,.3);}
.add-btn.visible{display:block;}

/* TOAST */
.toast{position:fixed;bottom:72px;right:20px;z-index:700;background:rgba(9,22,40,.97);border:1px solid rgba(201,151,58,.5);border-radius:6px;padding:9px 16px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--goldP);pointer-events:none;display:none;max-width:280px;}
.toast.show{display:block;animation:toastPop 3s ease forwards;}
.toast.err{border-color:rgba(255,80,80,.6);color:#ff9090;}

/* OVERLAYS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px;}
.overlay.open{display:flex;}
.modal{background:var(--navy2);border:1px solid rgba(201,151,58,.32);border-radius:8px;padding:22px;width:100%;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'Playfair Display',serif;font-size:17px;color:var(--goldP);margin-bottom:12px;}
.modal-btns{display:flex;gap:9px;margin-top:14px;flex-wrap:wrap;}
.mbtn{padding:8px 18px;border-radius:4px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;font-weight:600;border:none;transition:all .2s;font-family:'DM Sans',sans-serif;}
.mbtn.ok{background:var(--gold);color:var(--navy);}.mbtn.ok:hover{background:var(--goldB);}
.mbtn.cancel{background:rgba(255,255,255,.1);color:#ccc;}.mbtn.cancel:hover{background:rgba(255,255,255,.18);}
.pw-modal{max-width:340px;}
.pw-input{width:100%;padding:10px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(201,151,58,.3);border-radius:4px;color:var(--white);font-size:14px;letter-spacing:.2em;outline:none;font-family:'DM Sans',sans-serif;margin-top:2px;}
.pw-input:focus{border-color:var(--gold);}
.pw-error{font-size:10px;color:#ff7070;margin-top:6px;display:none;}
.crop-modal{max-width:520px;}
.crop-area{position:relative;width:100%;background:#000;border:1px solid rgba(201,151,58,.3);border-radius:4px;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;}
.crop-img{display:block;width:100%;height:auto;max-height:54vh;object-fit:contain;pointer-events:none;-webkit-user-drag:none;}
.crop-box{position:absolute;border:2px solid var(--goldB);cursor:move;touch-action:none;box-shadow:0 0 0 9999px rgba(0,0,0,.5);}
.crop-thirds{position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(rgba(255,220,100,.2) 1px,transparent 1px) 0 33.33%/100% 1px no-repeat,
    linear-gradient(rgba(255,220,100,.2) 1px,transparent 1px) 0 66.66%/100% 1px no-repeat,
    linear-gradient(90deg,rgba(255,220,100,.2) 1px,transparent 1px) 33.33% 0/1px 100% no-repeat,
    linear-gradient(90deg,rgba(255,220,100,.2) 1px,transparent 1px) 66.66% 0/1px 100% no-repeat;}
.crop-handle{position:absolute;width:14px;height:14px;background:var(--gold);border-radius:2px;z-index:3;touch-action:none;}
.crop-handle.nw{top:-7px;left:-7px;cursor:nw-resize;}
.crop-handle.ne{top:-7px;right:-7px;cursor:ne-resize;}
.crop-handle.sw{bottom:-7px;left:-7px;cursor:sw-resize;}
.crop-handle.se{bottom:-7px;right:-7px;cursor:se-resize;}
.crop-hint{font-size:9px;color:rgba(184,204,224,.4);margin-top:7px;text-align:center;}
</style>
</head>

          <div class="photo-placeholder-text">Click to add photo</div>
        </div>
        <div class="photo-shimmer"></div>
        <div class="upload-overlay" id="uploadOverlay">
          <span>📷 Upload Photo</span>
        </div>
        <button class="del-photo-btn" id="delPhotoBtn">✕</button>
        <div class="photo-pos-hint">drag to reposition · scroll to zoom in/out</div>
      </div>
      <button class="del-card-btn" id="delCardBtn">✕ Remove this person</button>
    </div>

    <!-- INFO -->
    <div class="info-panel" id="infoPanel">
      <div class="info-counter" id="infoCounter">01 / 09</div>
      <div class="info-divider"><div class="gem"></div></div>
      <div class="info-position" id="infoPosition" contenteditable="false">President</div>
      <div class="info-name" id="infoName" contenteditable="false">Click to add name</div>
      <div class="info-batch">G-11 Emerson · 2025–2026</div>
    </div>

    <button class="arrow right" id="arrowRight">›</button>
  </div>

  <!-- DOTS -->
  <div class="dots" id="dots"></div>
</div>

<!-- Edit / Save / Add -->
<button class="edit-toggle" id="editToggle">✎</button>
<button class="save-btn" id="saveBtn">💾 Save</button>
<button class="add-btn" id="addBtn">+ Add Person</button>

<!-- Password -->
<div class="overlay" id="pwOverlay">
  <div class="modal pw-modal">
    <div class="modal-title">🔒 Enter Edit Password</div>
    <input class="pw-input" id="pwInput" type="password" placeholder="Password" maxlength="30"/>
    <div class="pw-error" id="pwError">Incorrect password.</div>
    <div class="modal-btns">
      <button class="mbtn ok" id="pwOk">Unlock</button>
      <button class="mbtn cancel" id="pwCancel">Cancel</button>
    </div>
  </div>
</div>

<!-- Crop -->
<div class="overlay" id="cropOverlay">
  <div class="modal crop-modal">
    <div class="modal-title">✂ Crop Photo</div>
    <div class="crop-area" id="cropArea">
      <img class="crop-img" id="cropImg" src="" alt=""/>
      <div class="crop-thirds"></div>
      <div class="crop-box" id="cropBox">
        <div class="crop-handle nw" data-dir="nw"></div>
        <div class="crop-handle ne" data-dir="ne"></div>
        <div class="crop-handle sw" data-dir="sw"></div>
        <div class="crop-handle se" data-dir="se"></div>
      </div>
    </div>
    <div class="crop-hint">Drag to reposition · Handles to resize</div>
    <div class="modal-btns">
      <button class="mbtn ok" id="cropApply">Apply & Upload</button>
      <button class="mbtn cancel" id="cropCancel">Cancel</button>
    </div>
  </div>
</div>

<script>
'use strict';
const EDIT_PW           = 'BNSHI2026';
const FB_URL            = 'https://emerson-11-memories-default-rtdb.firebaseio.com';
const FB_PATH           = `${FB_URL}/officers.json`;
const CLOUDINARY_CLOUD  = 'dbtoadpgi';
const CLOUDINARY_PRESET = 'images memories';
const IMG_MAX_PX = 1200, IMG_Q_START = 0.82, IMG_TARGET_KB = 800;

const BASE_OFFICERS = [{"id": "president", "position": "President"}, {"id": "vicepresident", "position": "Vice President"}, {"id": "secretary", "position": "Secretary"}, {"id": "treasurer", "position": "Treasurer"}, {"id": "auditor", "position": "Auditor"}, {"id": "pio", "position": "P.I.O"}, {"id": "sgarms", "position": "Sergeant at Arms"}, {"id": "muse", "position": "Muse"}, {"id": "escort", "position": "Escort"}];

let isEditing  = false;
let slots      = [];   // [{id, position, custom}]
let data       = {};   // data[id] = {src, name, position}
let current    = 0;
let cropActive = false;
let animDir    = 'right';

// ── STARS ────────────────────────────────────────────────
(function(){
  const c = document.getElementById('starsContainer');
  for(let i=0;i<65;i++){
    const s = document.createElement('div'); s.className='star';
    const sz = Math.random()*1.8+.4;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;`
      + `--d:${2+Math.random()*4}s;--delay:${Math.random()*5}s;`
      + `--min:${.1+Math.random()*.2};--max:${.5+Math.random()*.5};`;
    c.appendChild(s);
  }
})();

// ── TOAST ────────────────────────────────────────────────
let _tt=null;
function toast(msg,isErr=false){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast'+(isErr?' err':'');
  void el.offsetWidth; el.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>el.className='toast',3200);
}

// ── COMPRESS ─────────────────────────────────────────────
function compress(dataURL){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=function(){
      const scale=Math.min(IMG_MAX_PX/Math.max(img.width,img.height),1);
      const W=Math.round(img.width*scale),H=Math.round(img.height*scale);
      const canvas=document.createElement('canvas');
      canvas.width=W;canvas.height=H;
      canvas.getContext('2d').drawImage(img,0,0,W,H);
      let q=IMG_Q_START,out;
      do{out=canvas.toDataURL('image/jpeg',q);q=parseFloat((q-.05).toFixed(2));}
      while(out.length*.75/1024>IMG_TARGET_KB&&q>0.05);
      resolve(out);
    };
    img.onerror=()=>resolve(dataURL);
    img.src=dataURL;
  });
}

// ── CLOUDINARY ───────────────────────────────────────────
async function uploadPhoto(dataURL){
  try{
    const form=new FormData();
    form.append('file',dataURL);
    form.append('upload_preset',CLOUDINARY_PRESET);
    const r=await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`,{method:'POST',body:form});
    if(!r.ok) throw new Error(`Cloudinary ${r.status}`);
    const json=await r.json();
    return json.secure_url||null;
  }catch(e){console.error(e);return null;}
}

// ── FIREBASE ─────────────────────────────────────────────
async function saveAll(){
  try{
    const r=await fetch(FB_PATH,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    return r.ok;
  }catch(e){return false;}
}

async function loadAll(){
  try{
    const r=await fetch(FB_PATH);
    if(!r.ok) return;
    const d=await r.json();
    if(d) Object.assign(data,d);
  }catch(e){console.error(e);}
  buildSlots();
  renderDots();
  showOfficer(0,false);
}

// ── SLOTS ────────────────────────────────────────────────
function buildSlots(){
  const custom=Object.keys(data).filter(id=>id.startsWith('custom_'));
  slots=[
    ...BASE_OFFICERS.map(o=>({id:o.id,position:o.position,custom:false})),
    ...custom.map(id=>({id,position:data[id]&&data[id].position?data[id].position:'Member',custom:true}))
  ];
}

// ── DOTS ─────────────────────────────────────────────────
function renderDots(){
  const dotsEl=document.getElementById('dots');
  dotsEl.innerHTML='';
  slots.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===current?' active':'');
    d.addEventListener('click',()=>{ animDir=i>current?'right':'left'; goTo(i); });
    dotsEl.appendChild(d);
  });
}

function updateDots(){
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===current));
}

// ── SHOW OFFICER ─────────────────────────────────────────
function showOfficer(idx, animate=true){
  current=((idx%slots.length)+slots.length)%slots.length;
  const o=slots[current];
  const d=data[o.id]||{};
  const name=d.name||'Click to add name';
  const pos=d.position||o.position;
  const src=d.src||null;

  const frame=document.getElementById('photoFrame');
  const placeholder=document.getElementById('photoPlaceholder');
  const infoName=document.getElementById('infoName');
  const infoPos=document.getElementById('infoPosition');
  const infoCounter=document.getElementById('infoCounter');
  const delCard=document.getElementById('delCardBtn');

  // animate
  if(animate){
    const photoStage=document.getElementById('photoStage');
    const infoPanel=document.getElementById('infoPanel');
    const animPhoto=animDir==='right'?'slideInRight':'slideInLeft';
    const animInfo=animDir==='right'?'slideInLeft':'slideInRight';
    photoStage.style.animation='none'; void photoStage.offsetWidth;
    photoStage.style.animation=`${animPhoto} .4s cubic-bezier(.25,.46,.45,.94) both`;
    infoPanel.style.animation='none'; void infoPanel.offsetWidth;
    infoPanel.style.animation=`${animInfo} .4s cubic-bezier(.25,.46,.45,.94) both`;
  }

  // photo
  let imgEl=frame.querySelector('img');
  if(src){
    if(!imgEl){ imgEl=document.createElement('img'); frame.insertBefore(imgEl,frame.firstChild); }
    imgEl.src=src;
    // load saved position
    if(d.photoPos) photoPos[o.id] = d.photoPos;
    imgEl = initPhotoDrag(imgEl, o.id);
    placeholder.style.display='none';
  } else {
    if(imgEl) imgEl.remove();
    placeholder.style.display='flex';
  }

  // info
  infoName.textContent=name;
  infoPos.textContent=pos;
  infoCounter.textContent=String(current+1).padStart(2,'0')+' / '+String(slots.length).padStart(2,'0');

  // del card btn visibility
  delCard.className='del-card-btn'+(o.custom?' custom':'');

  updateDots();
  updateEditState();
}

function goTo(idx){
  showOfficer(idx,true);
}

// ── PHOTO DRAG & ZOOM ────────────────────────────────────
let photoPos = {}; // photoPos[id] = {x, y, zoom}
let _dragActive = false, _dragStart = null, _posStart = null;

function getPos(id){ return photoPos[id] || {x:0, y:0, zoom:1}; }

function applyPos(imgEl, id){
  const p = getPos(id);
  imgEl.style.transform = `translate(${p.x}px, ${p.y}px) scale(${p.zoom})`;
}

function initPhotoDrag(imgEl, id){
  // remove old listeners by cloning
  const newImg = imgEl.cloneNode(true);
  imgEl.parentNode.replaceChild(newImg, imgEl);
  imgEl = newImg;
  applyPos(imgEl, id);

  function canDrag(){ return isEditing; }

  function onDown(cx, cy){
    if(!canDrag()) return;
    _dragActive = true;
    _dragStart = {x:cx, y:cy};
    const p = getPos(id);
    _posStart = {x:p.x, y:p.y};
    imgEl.classList.add('dragging');
  }
  function onMove(cx, cy){
    if(!_dragActive) return;
    const dx = cx - _dragStart.x, dy = cy - _dragStart.y;
    if(!photoPos[id]) photoPos[id] = {x:0,y:0,zoom:1};
    photoPos[id].x = _posStart.x + dx;
    photoPos[id].y = _posStart.y + dy;
    applyPos(imgEl, id);
  }
  function onUp(){
    if(!_dragActive) return;
    _dragActive = false;
    imgEl.classList.remove('dragging');
    savePhotoPos(id);
  }

  imgEl.addEventListener('mousedown', e=>{ if(!canDrag()) return; e.preventDefault(); onDown(e.clientX, e.clientY); });
  window.addEventListener('mousemove', e=>{ if(_dragActive) onMove(e.clientX, e.clientY); });
  window.addEventListener('mouseup', onUp);

  imgEl.addEventListener('touchstart', e=>{ if(!canDrag()) return; e.preventDefault(); onDown(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
  window.addEventListener('touchmove', e=>{ if(_dragActive){ e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); } }, {passive:false});
  window.addEventListener('touchend', onUp);

  // scroll to zoom
  document.getElementById('photoFrame').addEventListener('wheel', e=>{
    if(!canDrag()) return;
    e.preventDefault();
    if(!photoPos[id]) photoPos[id] = {x:0,y:0,zoom:1};
    const delta = e.deltaY > 0 ? -0.05 : 0.05;
    photoPos[id].zoom = Math.min(3, Math.max(0.3, photoPos[id].zoom + delta));
    applyPos(imgEl, id);
    savePhotoPos(id);
  }, {passive:false});

  return imgEl;
}

function savePhotoPos(id){
  if(!data[id]) data[id] = {};
  data[id].photoPos = getPos(id);
  saveAll();
}

// ── ARROWS ───────────────────────────────────────────────
document.getElementById('arrowLeft').addEventListener('click',()=>{ animDir='left'; goTo(current-1); });
document.getElementById('arrowRight').addEventListener('click',()=>{ animDir='right'; goTo(current+1); });

// ── EDIT STATE ───────────────────────────────────────────
function updateEditState(){
  const stage=document.getElementById('stage');
  const nameEl=document.getElementById('infoName');
  const posEl=document.getElementById('infoPosition');
  if(isEditing){
    stage.classList.add('edit-mode');
    nameEl.contentEditable='true';
    posEl.contentEditable='true';
  } else {
    stage.classList.remove('edit-mode');
    nameEl.contentEditable='false';
    posEl.contentEditable='false';
  }
}

// ── COLLECT CURRENT EDITS ────────────────────────────────
function collectCurrent(){
  const o=slots[current];
  if(!data[o.id]) data[o.id]={};
  data[o.id].name=document.getElementById('infoName').textContent.trim();
  data[o.id].position=document.getElementById('infoPosition').textContent.trim();
}

// ── EDIT TOGGLE ──────────────────────────────────────────
document.getElementById('editToggle').addEventListener('click',()=>{
  if(!isEditing){
    document.getElementById('pwInput').value='';
    document.getElementById('pwError').style.display='none';
    document.getElementById('pwOverlay').classList.add('open');
    setTimeout(()=>document.getElementById('pwInput').focus(),100);
  } else {
    collectCurrent();
    saveAll().then(ok=>toast(ok?'✅ Saved!':'⚠ Save failed',!ok));
    isEditing=false;
    document.getElementById('editToggle').classList.remove('active');
    document.getElementById('saveBtn').classList.remove('visible');
    document.getElementById('addBtn').classList.remove('visible');
    updateEditState();
  }
});

document.getElementById('saveBtn').addEventListener('click',()=>{
  collectCurrent();
  saveAll().then(ok=>toast(ok?'✅ Saved!':'⚠ Save failed',!ok));
});

// ── PASSWORD ─────────────────────────────────────────────
document.getElementById('pwOk').addEventListener('click',checkPw);
document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')checkPw();});
document.getElementById('pwCancel').addEventListener('click',()=>document.getElementById('pwOverlay').classList.remove('open'));

function checkPw(){
  if(document.getElementById('pwInput').value===EDIT_PW){
    document.getElementById('pwOverlay').classList.remove('open');
    isEditing=true;
    document.getElementById('editToggle').classList.add('active');
    document.getElementById('saveBtn').classList.add('visible');
    document.getElementById('addBtn').classList.add('visible');
    updateEditState();
    toast('✏️ Edit mode on');
  } else {
    document.getElementById('pwError').style.display='block';
    document.getElementById('pwInput').value='';
  }
}

// ── ADD PERSON ───────────────────────────────────────────
document.getElementById('addBtn').addEventListener('click',()=>{
  collectCurrent();
  const id='custom_'+Date.now();
  data[id]={name:'Click to add name',position:'Title / Role',src:null};
  buildSlots();
  renderDots();
  animDir='right';
  showOfficer(slots.length-1,true);
  saveAll();
});

// ── DELETE CARD ──────────────────────────────────────────
document.getElementById('delCardBtn').addEventListener('click',async()=>{
  const o=slots[current];
  if(!o.custom) return;
  delete data[o.id];
  try{ await fetch(`${FB_URL}/officers/${o.id}.json`,{method:'DELETE'}); }catch(e){}
  await saveAll();
  buildSlots();
  renderDots();
  animDir='left';
  showOfficer(Math.min(current,slots.length-1),false);
  toast('🗑 Person removed');
});

// ── UPLOAD PHOTO ─────────────────────────────────────────
document.getElementById('uploadOverlay').addEventListener('click',()=>{
  if(!isEditing) return;
  const input=document.createElement('input');
  input.type='file'; input.accept='image/*';
  input.onchange=e=>{ if(e.target.files[0]) loadForCrop(e.target.files[0]); };
  input.click();
});

document.getElementById('delPhotoBtn').addEventListener('click',async()=>{
  const o=slots[current];
  if(!data[o.id]) data[o.id]={};
  delete data[o.id].src;
  try{ await fetch(`${FB_URL}/officers/${o.id}/src.json`,{method:'DELETE'}); }catch(e){}
  await saveAll();
  toast('🗑 Photo removed');
  showOfficer(current,false);
});

// ── CROP ─────────────────────────────────────────────────
function loadForCrop(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const img=document.getElementById('cropImg');
    img.src=e.target.result;
    img.onload=()=>initCropBox();
    document.getElementById('cropOverlay').classList.add('open');
  };
  reader.readAsDataURL(file);
}

function $ca(){ return document.getElementById('cropArea'); }
function $cb(){ return document.getElementById('cropBox'); }

function initCropBox(){
  const area=$ca(), w=area.clientWidth, h=area.clientHeight;
  const size=Math.min(w,h)*.72;
  const box=$cb();
  box.style.left=((w-size)/2)+'px'; box.style.top=((h-size)/2)+'px';
  box.style.width=size+'px'; box.style.height=size+'px';
}

function readBox(){
  const box=$cb();
  return{x:parseInt(box.style.left),y:parseInt(box.style.top),w:box.offsetWidth,h:box.offsetHeight};
}

let dragStart=null,boxStart=null,resizeDir=null;
function cropDown(dir,cx,cy){cropActive=true;resizeDir=dir;dragStart={x:cx,y:cy};const b=readBox();boxStart={...b};}
function cropMove(cx,cy){
  if(!cropActive) return;
  const dx=cx-dragStart.x,dy=cy-dragStart.y;
  const area=$ca(),box=$cb();
  const aw=area.clientWidth,ah=area.clientHeight;
  let{x,y,w,h}=boxStart;const MIN=60;
  if(resizeDir==='move'){x=Math.max(0,Math.min(aw-w,x+dx));y=Math.max(0,Math.min(ah-h,y+dy));}
  else{
    if(resizeDir.includes('e')){w=Math.max(MIN,Math.min(aw-x,w+dx));}
    if(resizeDir.includes('s')){h=Math.max(MIN,Math.min(ah-y,h+dy));}
    if(resizeDir.includes('w')){const nw=Math.max(MIN,w-dx);x=Math.min(x+w-MIN,x+dx);w=nw;}
    if(resizeDir.includes('n')){const nh=Math.max(MIN,h-dy);y=Math.min(y+h-MIN,y+dy);h=nh;}
    x=Math.max(0,x);y=Math.max(0,y);w=Math.min(w,aw-x);h=Math.min(h,ah-y);
  }
  box.style.left=x+'px';box.style.top=y+'px';box.style.width=w+'px';box.style.height=h+'px';
}

$cb().addEventListener('mousedown',e=>{e.preventDefault();cropDown('move',e.clientX,e.clientY);});
$cb().addEventListener('touchstart',e=>{e.preventDefault();cropDown('move',e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
document.querySelectorAll('.crop-handle').forEach(h=>{
  h.addEventListener('mousedown',e=>{e.preventDefault();e.stopPropagation();cropDown(h.dataset.dir,e.clientX,e.clientY);});
  h.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();cropDown(h.dataset.dir,e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
});
document.addEventListener('mousemove',e=>cropMove(e.clientX,e.clientY));
document.addEventListener('mouseup',()=>{cropActive=false;});
document.addEventListener('touchmove',e=>{if(!cropActive)return;e.preventDefault();cropMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
document.addEventListener('touchend',()=>{cropActive=false;});

document.getElementById('cropApply').addEventListener('click',async()=>{
  const img=document.getElementById('cropImg');
  if(!img.naturalWidth){toast('Image not ready',true);return;}
  const area=$ca(),b=readBox();
  const sx=img.naturalWidth/area.clientWidth,sy=img.naturalHeight/area.clientHeight;
  const canvas=document.createElement('canvas');
  const sw=Math.round(b.w*sx),sh=Math.round(b.h*sy);
  canvas.width=sw;canvas.height=sh;
  canvas.getContext('2d').drawImage(img,Math.round(b.x*sx),Math.round(b.y*sy),sw,sh,0,0,sw,sh);
  document.getElementById('cropOverlay').classList.remove('open');
  toast('⏳ Uploading…');
  const compressed=await compress(canvas.toDataURL('image/jpeg',IMG_Q_START));
  const url=await uploadPhoto(compressed);
  if(!url){toast('⚠ Upload failed',true);return;}
  const o=slots[current];
  if(!data[o.id]) data[o.id]={};
  data[o.id].src=url;
  // reset position so new photo starts fully fitted
  delete photoPos[o.id];
  data[o.id].photoPos = null;
  const ok=await saveAll();
  toast(ok?'✅ Photo saved!':'⚠ Save failed',!ok);
  showOfficer(current,false);
});

document.getElementById('cropCancel').addEventListener('click',()=>{
  document.getElementById('cropOverlay').classList.remove('open');
  cropActive=false;
});

// ── BOOT ─────────────────────────────────────────────────
loadAll();
</script>
</body>
</html>
