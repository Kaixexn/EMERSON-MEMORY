<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>G-11 Emerson — Class Officers</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:       #050d1f;
  --navy2:      #0a1830;
  --navy3:      #0d2040;
  --gold:       #c9973a;
  --gold-b:     #e8b84b;
  --gold-p:     #f0d080;
  --gold-d:     #7a5a1e;
  --gold-faint: rgba(201,151,58,0.12);
  --cream:      #f5f0e8;
  --cream2:     #ede8d8;
  --cream3:     #e4dcc8;
  --white:      #fff;
  --text:       #0d1827;
  --text2:      #3a4a5e;
  --text3:      #7a8a9a;

  
  --shadow-card:  0 1px 4px rgba(5,13,31,0.07), 0 3px 12px rgba(5,13,31,0.08), 4px 6px 20px rgba(5,13,31,0.06);
  --shadow-hover: 0 3px 10px rgba(5,13,31,0.1),  0 8px 28px rgba(5,13,31,0.12), 5px 8px 26px rgba(5,13,31,0.07);
}

html { scroll-behavior: smooth; }

body {
  background-color: var(--cream);
  background-image:
    radial-gradient(ellipse 90% 35% at 50% 0%, rgba(201,151,58,0.09) 0%, transparent 65%),
    repeating-linear-gradient(
      0deg,
      transparent, transparent 31px,
      rgba(5,13,31,0.014) 31px, rgba(5,13,31,0.014) 32px
    );
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

@keyframes cardReveal {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0)   scale(1);    }
}

@keyframes fadeIn {
  from { opacity: 0; } to { opacity: 1; }
}

@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.92); }
  to   { opacity: 1; transform: scale(1);    }
}

@keyframes toastPop {
  0%  { opacity: 0; transform: translateY(8px) scale(.95); }
  15% { opacity: 1; transform: none; }
  80% { opacity: 1; }
  100%{ opacity: 0; }
}

@keyframes shimmer {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(200%);  }
}

.topbar {
  position: relative; z-index: 10;
  background: linear-gradient(160deg, var(--navy) 0%, var(--navy3) 100%);
  padding: 14px 32px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(201,151,58,0.2);
  box-shadow: 0 2px 20px rgba(5,13,31,0.35);
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.logo-img {
  width: 42px; height: 42px; border-radius: 50%;
  border: 1.5px solid rgba(201,151,58,0.55);
  box-shadow: 0 0 14px rgba(201,151,58,0.22);
}
.topbar-text .eyebrow { font-size: 7.5px; letter-spacing: .45em; text-transform: uppercase; color: var(--gold); margin-bottom: 2px; }
.topbar-text .brand   { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 700; color: var(--cream); letter-spacing: .02em; }
.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 16px; border: 1px solid rgba(201,151,58,0.28);
  background: rgba(201,151,58,0.07); border-radius: 2px;
  color: var(--gold-p); font-size: 8.5px; letter-spacing: .14em;
  text-transform: uppercase; cursor: pointer; text-decoration: none; transition: all .2s;
}
.back-btn:hover { background: rgba(201,151,58,0.18); border-color: var(--gold); }

.yearbook-header { position: relative; z-index: 5; text-align: center; padding: 40px 24px 26px; }
.yh-eyebrow { font-size: 9px; letter-spacing: .55em; text-transform: uppercase; color: var(--gold-d); margin-bottom: 10px; font-weight: 500; }
.yh-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 5vw, 3.4rem); font-weight: 900;
  color: var(--navy); letter-spacing: -.01em; line-height: 1; margin-bottom: 6px;
}
.yh-sub { font-size: 10px; letter-spacing: .42em; text-transform: uppercase; color: var(--text2); margin-bottom: 20px; font-weight: 500; }
.yh-rule { display: flex; align-items: center; gap: 14px; justify-content: center; max-width: 440px; margin: 0 auto; }
.yh-rule-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, rgba(201,151,58,0.5), transparent); }
.yh-rule-gem  { width: 7px; height: 7px; background: var(--gold); transform: rotate(45deg); box-shadow: 0 0 8px rgba(201,151,58,0.5); flex-shrink: 0; }

.skeleton-card {
  background: var(--white);
  padding: 9px 9px 13px;
  box-shadow: var(--shadow-card);
  border-radius: 2px;
}
.skeleton-photo {
  aspect-ratio: 4/5;
  background: var(--cream2);
  position: relative;
  overflow: hidden;
  margin-bottom: 9px;
}
.skeleton-line {
  height: 9px; border-radius: 4px;
  background: var(--cream3);
  position: relative; overflow: hidden;
}

.skeleton-photo::after, .skeleton-line::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.55) 50%, transparent 100%);
  animation: shimmer 1.6s infinite ease-in-out;
}

.officers-grid {
  position: relative; z-index: 5;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 30px;
  padding: 32px 52px 52px;
  max-width: 1320px;
  margin: 0 auto;
}
@media (max-width: 1120px) { .officers-grid { grid-template-columns: repeat(4, 1fr); gap: 24px; padding: 28px 38px 44px; } }
@media (max-width:  820px) { .officers-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 24px 28px 38px; } }
@media (max-width:  540px) { .officers-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 20px 16px 32px; } }

.officer-card {
  position: relative;
  background: var(--white);
  padding: 9px 9px 13px;
  box-shadow: var(--shadow-card);
  animation: cardReveal .5s cubic-bezier(.22,.8,.36,1) both;
  
  transition: transform .25s ease, box-shadow .25s ease;
  cursor: pointer;
}
.officer-card:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-hover);
}
.officer-card.edit-mode .card-photo-wrap { cursor: pointer; }

.corner { position: absolute; width: 13px; height: 13px; border-color: var(--gold); border-style: solid; z-index: 3; opacity: .75; }
.corner.tl { top: 3px;    left: 3px;    border-width: 1.5px 0 0 1.5px; }
.corner.tr { top: 3px;    right: 3px;   border-width: 1.5px 1.5px 0 0; }
.corner.bl { bottom: 3px; left: 3px;    border-width: 0 0 1.5px 1.5px; }
.corner.br { bottom: 3px; right: 3px;   border-width: 0 1.5px 1.5px 0; }

.card-photo-wrap {
  position: relative; aspect-ratio: 4/5;
  background: var(--cream2); border: 1px solid rgba(201,151,58,0.35);
  overflow: hidden; margin-bottom: 9px;
}
.card-photo { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .35s ease; }
.officer-card:not(.edit-mode):hover .card-photo { transform: scale(1.04); }

.card-photo-placeholder {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
  background: linear-gradient(135deg, var(--cream2) 0%, var(--cream3) 100%);
}
.ph-icon { font-size: 30px; opacity: .15; }
.ph-text  { font-size: 7px; letter-spacing: .2em; text-transform: uppercase; color: var(--text3); opacity: .55; }

.card-upload-overlay {
  position: absolute; inset: 0; z-index: 10;
  background: rgba(5,13,31,0.58);
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 4px;
  opacity: 0; transition: opacity .2s; cursor: pointer;
}
.card-upload-overlay span { font-size: 8px; letter-spacing: .18em; text-transform: uppercase; color: var(--gold-p); }
.officer-card.edit-mode .card-photo-wrap:hover .card-upload-overlay { opacity: 1; }

.card-zoom-hint {
  position: absolute; bottom: 6px; right: 6px; z-index: 5;
  background: rgba(5,13,31,0.68); border: 1px solid rgba(201,151,58,0.3);
  border-radius: 2px; padding: 2px 7px;
  font-size: 6.5px; letter-spacing: .15em; text-transform: uppercase;
  color: var(--gold-p); opacity: 0; transition: opacity .2s; pointer-events: none;
}
.officer-card:not(.edit-mode):hover .card-zoom-hint { opacity: 1; }

.photo-del-btn {
  position: absolute; top: 5px; right: 5px; z-index: 15;
  width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--white);
  background: rgba(210,45,45,0.9); color: #fff; font-size: 9px;
  cursor: pointer; display: none; align-items: center; justify-content: center; transition: background .15s;
}
.photo-del-btn:hover { background: rgb(210,45,45); }
.officer-card.edit-mode.has-photo .photo-del-btn { display: flex; }

.card-info { text-align: center; padding: 0 3px; }
.card-position {
  font-size: 7.5px; letter-spacing: .28em; text-transform: uppercase;
  color: var(--gold-d); margin-bottom: 4px; font-weight: 600; outline: none; min-height: 12px;
}
.card-position[contenteditable=true] { border-bottom: 1px dashed rgba(201,151,58,0.6); padding-bottom: 1px; cursor: text; }
.card-name {
  font-family: 'Playfair Display', serif;
  font-size: clamp(11px, 1.3vw, 14px); font-weight: 700; color: var(--navy); line-height: 1.25;
  outline: none; min-height: 16px;
}
.card-name[contenteditable=true] { cursor: text; border-bottom: 1px dashed rgba(5,13,31,0.25); }
.card-quote {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: clamp(8.5px, 0.9vw, 10px); color: var(--text2); line-height: 1.45;
  margin-top: 5px; padding-top: 5px; border-top: 1px solid rgba(201,151,58,0.2);
  outline: none; min-height: 14px;
}
.card-quote:empty::before { content: '"Add a quote…"'; opacity: .3; font-style: italic; }
.card-quote[contenteditable=true] { cursor: text; background: rgba(201,151,58,0.04); padding: 2px 4px; border-radius: 2px; }

.officer-card:not(.edit-mode) .card-quote:empty { display: none; }

.card-del-btn {
  position: absolute; top: -8px; right: -8px; z-index: 20;
  width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--white);
  background: rgba(210,45,45,0.92); color: #fff; font-size: 9px;
  cursor: pointer; display: none; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
.officer-card.edit-mode .card-del-btn { display: flex; }

.yearbook-footer { position: relative; z-index: 5; text-align: center; padding: 12px 24px 36px; }
.page-num { display: inline-flex; align-items: center; gap: 12px; font-size: 8px; letter-spacing: .45em; text-transform: uppercase; color: var(--text3); }
.page-dot { width: 3.5px; height: 3.5px; border-radius: 50%; background: var(--gold-d); opacity: .45; }

.edit-toggle {
  position: fixed; bottom: 24px; right: 24px; z-index: 500;
  width: 44px; height: 44px; border-radius: 50%;
  border: 1px solid rgba(201,151,58,0.4); background: var(--navy);
  color: var(--gold); font-size: 18px; cursor: pointer;
  box-shadow: 0 4px 18px rgba(5,13,31,0.45); transition: all .25s;
  display: flex; align-items: center; justify-content: center;
}
.edit-toggle:hover  { background: rgba(201,151,58,0.18); border-color: var(--gold); }
.edit-toggle.active { background: rgba(201,151,58,0.22); border-color: var(--gold-b); color: var(--gold-b); }
.save-btn, .add-btn {
  position: fixed; z-index: 500; display: none;
  padding: 10px 18px; border-radius: 2px; border: 1px solid rgba(201,151,58,0.5);
  background: rgba(9,22,40,0.9); color: var(--gold-p);
  font-size: 8.5px; letter-spacing: .14em; text-transform: uppercase;
  cursor: pointer; transition: all .2s; font-family: 'DM Sans', sans-serif; backdrop-filter: blur(6px);
}
.save-btn:hover, .add-btn:hover { background: rgba(201,151,58,0.25); }
.save-btn.visible, .add-btn.visible { display: block; }
.save-btn { bottom: 24px; right: 78px; }
.add-btn  { bottom: 24px; left: 24px; }

.toast {
  position: fixed; bottom: 76px; right: 20px; z-index: 700;
  background: var(--navy2); border: 1px solid rgba(201,151,58,0.5);
  border-radius: 4px; padding: 9px 16px; font-size: 9px;
  letter-spacing: .12em; text-transform: uppercase; color: var(--gold-p);
  pointer-events: none; display: none; max-width: 280px;
}
.toast.show { display: block; animation: toastPop 3.2s ease forwards; }
.toast.err  { border-color: rgba(255,80,80,.6); color: #ff9090; }

.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.88); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 16px; }
.overlay.open { display: flex; }
.modal { background: var(--navy2); border: 1px solid rgba(201,151,58,0.32); border-radius: 6px; padding: 24px; width: 100%; max-height: 90vh; overflow-y: auto; }
.modal-title { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--gold-p); margin-bottom: 12px; }
.modal-btns  { display: flex; gap: 9px; margin-top: 14px; flex-wrap: wrap; }
.mbtn        { padding: 8px 18px; border-radius: 2px; font-size: 9px; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; font-weight: 600; border: none; transition: all .2s; font-family: 'DM Sans', sans-serif; }
.mbtn.ok     { background: var(--gold); color: var(--navy); }
.mbtn.ok:hover     { background: var(--gold-b); }
.mbtn.cancel       { background: rgba(255,255,255,.1); color: #ccc; }
.mbtn.cancel:hover { background: rgba(255,255,255,.18); }
.pw-modal { max-width: 340px; }
.pw-input  { width: 100%; padding: 10px 14px; background: rgba(255,255,255,.06); border: 1px solid rgba(201,151,58,0.3); border-radius: 2px; color: #fff; font-size: 14px; letter-spacing: .2em; outline: none; font-family: 'DM Sans', sans-serif; margin-top: 2px; }
.pw-input:focus { border-color: var(--gold); }
.pw-error  { font-size: 9px; color: #ff7070; margin-top: 6px; display: none; }
.crop-modal { max-width: 520px; }
.crop-area  { position: relative; width: 100%; background: #000; border: 1px solid rgba(201,151,58,0.3); border-radius: 4px; overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; }
.crop-img   { display: block; width: 100%; height: auto; max-height: 54vh; object-fit: contain; pointer-events: none; -webkit-user-drag: none; }
.crop-box   { position: absolute; border: 2px solid var(--gold-b); cursor: move; touch-action: none; box-shadow: 0 0 0 9999px rgba(0,0,0,.5); }

.crop-thirds {
  position: absolute; inset: 0; pointer-events: none;
  background:
    linear-gradient(rgba(255,220,100,.2) 1px, transparent 1px) 0 33.33% / 100% 1px no-repeat,
    linear-gradient(rgba(255,220,100,.2) 1px, transparent 1px) 0 66.66% / 100% 1px no-repeat,
    linear-gradient(90deg, rgba(255,220,100,.2) 1px, transparent 1px) 33.33% 0 / 1px 100% no-repeat,
    linear-gradient(90deg, rgba(255,220,100,.2) 1px, transparent 1px) 66.66% 0 / 1px 100% no-repeat;
}
.crop-handle      { position: absolute; width: 14px; height: 14px; background: var(--gold); border-radius: 2px; z-index: 3; touch-action: none; }
.crop-handle.nw   { top: -7px;    left: -7px;  cursor: nw-resize; }
.crop-handle.ne   { top: -7px;    right: -7px; cursor: ne-resize; }
.crop-handle.sw   { bottom: -7px; left: -7px;  cursor: sw-resize; }
.crop-handle.se   { bottom: -7px; right: -7px; cursor: se-resize; }
.crop-hint { font-size: 9px; color: rgba(184,204,224,.4); margin-top: 7px; text-align: center; }

.lightbox-overlay { position: fixed; inset: 0; background: rgba(5,13,31,0.94); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 24px; backdrop-filter: blur(8px); }
.lightbox-overlay.open { display: flex; animation: fadeIn .2s ease; }
.lb-close { position: fixed; top: 20px; right: 20px; width: 38px; height: 38px; border-radius: 50%; border: 1px solid rgba(201,151,58,0.3); background: rgba(9,22,40,0.88); color: var(--gold-p); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; z-index: 10; }
.lb-close:hover { background: rgba(201,151,58,0.2); border-color: var(--gold); }
.lb-nav { position: fixed; top: 50%; transform: translateY(-50%); width: 46px; height: 46px; border-radius: 50%; border: 1px solid rgba(201,151,58,0.35); background: rgba(9,22,40,0.88); color: var(--gold); font-size: 24px; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; transition: all .25s; backdrop-filter: blur(4px); }
.lb-nav:hover { background: rgba(201,151,58,0.2); border-color: var(--gold); transform: translateY(-50%) scale(1.07); }
.lb-nav.prev { left: 18px; } .lb-nav.next { right: 18px; }
@media (max-width: 540px) { .lb-nav.prev { left: 6px; } .lb-nav.next { right: 6px; } .lb-nav { width: 36px; height: 36px; font-size: 18px; } }
.lightbox-inner { display: flex; flex-direction: column; align-items: center; gap: 18px; animation: scaleIn .25s cubic-bezier(.2,.8,.4,1); max-height: 90vh; max-width: 90vw; }
.lightbox-frame { position: relative; width: clamp(220px,38vh,320px); aspect-ratio: 4/5; border: 2px solid rgba(201,151,58,0.55); box-shadow: 0 0 60px rgba(201,151,58,0.14), 0 20px 60px rgba(0,0,0,.55); overflow: hidden; background: var(--cream2); transition: opacity .15s ease; }
.lightbox-frame.fading { opacity: 0; }
.lb-img { width: 100%; height: 100%; object-fit: cover; display: block; }
.lb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; }
.lb-ph-icon { font-size: 52px; opacity: .15; } .lb-ph-text { font-size: 7px; letter-spacing: .2em; text-transform: uppercase; color: rgba(184,204,224,.25); }
.lb-corner { position: absolute; width: 16px; height: 16px; border-color: var(--gold); border-style: solid; z-index: 3; opacity: .7; }
.lb-corner.tl { top: 5px;    left: 5px;    border-width: 2px 0 0 2px; }
.lb-corner.tr { top: 5px;    right: 5px;   border-width: 2px 2px 0 0; }
.lb-corner.bl { bottom: 5px; left: 5px;    border-width: 0 0 2px 2px; }
.lb-corner.br { bottom: 5px; right: 5px;   border-width: 0 2px 2px 0; }
.lightbox-info { text-align: center; }
.lb-pos  { font-size: 8.5px; letter-spacing: .32em; text-transform: uppercase; color: var(--gold); margin-bottom: 5px; }
.lb-name { font-family: 'Playfair Display', serif; font-size: clamp(1.2rem,3vw,1.8rem); font-weight: 700; color: #fff; }
.lb-quote { font-family: 'Playfair Display', serif; font-style: italic; font-size: clamp(10px,1.4vw,13px); color: rgba(240,208,128,0.75); max-width: 280px; margin: 0 auto; line-height: 1.55; text-align: center; }
.lb-quote:empty { display: none; }
.lb-counter { font-size: 8px; letter-spacing: .35em; text-transform: uppercase; color: rgba(184,204,224,.35); margin-top: 3px; }

</style>
</head>

<button class="edit-toggle" id="editToggle" title="Edit Mode">✎</button>
<button class="save-btn"    id="saveBtn">💾 Save</button>
<button class="add-btn"     id="addBtn">+ Add Person</button>

<div class="overlay" id="pwOverlay">
  <div class="modal pw-modal">
    <div class="modal-title">🔒 Enter Edit Password</div>
    <input class="pw-input" id="pwInput" type="password" placeholder="Password" maxlength="30"/>
    <div class="pw-error" id="pwError">Incorrect password.</div>
    <div class="modal-btns">
      <button class="mbtn ok" id="pwOk">Unlock</button>
      <button class="mbtn cancel" id="pwCancel">Cancel</button>
    </div>
  </div>
</div>

<div class="overlay" id="cropOverlay">
  <div class="modal crop-modal">
    <div class="modal-title">✂ Crop Photo</div>
    <div class="crop-area" id="cropArea">
      <img class="crop-img" id="cropImg" src="" alt=""/>
      <div class="crop-thirds"></div>
      <div class="crop-box" id="cropBox">
        <div class="crop-handle nw" data-dir="nw"></div>
        <div class="crop-handle ne" data-dir="ne"></div>
        <div class="crop-handle sw" data-dir="sw"></div>
        <div class="crop-handle se" data-dir="se"></div>
      </div>
    </div>
    <div class="crop-hint">Drag to reposition · Handles to resize</div>
    <div class="modal-btns">
      <button class="mbtn ok" id="cropApply">Apply & Upload</button>
      <button class="mbtn cancel" id="cropCancel">Cancel</button>
    </div>
  </div>
</div>

<div class="lightbox-overlay" id="lightboxOverlay">
  <button class="lb-close" id="lbClose">✕</button>
  <button class="lb-nav prev" id="lbPrev">‹</button>
  <button class="lb-nav next" id="lbNext">›</button>
  <div class="lightbox-inner">
    <div class="lightbox-frame" id="lbFrame">
      <div class="lb-corner tl"></div><div class="lb-corner tr"></div>
      <div class="lb-corner bl"></div><div class="lb-corner br"></div>
      <img class="lb-img" id="lbImg" src="" alt="" style="display:none"/>
      <div class="lb-placeholder" id="lbPlaceholder">
        <div class="lb-ph-icon">👤</div>
        <div class="lb-ph-text">No photo yet</div>
      </div>
    </div>
    <div class="lightbox-info">
      <div class="lb-pos"  id="lbPos"></div>
      <div class="lb-name" id="lbName"></div>
    </div>
    <div class="lb-quote"   id="lbQuote"></div>
    <div class="lb-counter" id="lbCounter"></div>
  </div>
</div>

<script>

'use strict';

const EDIT_PW           = 'BNSHI2026';
const FB_URL            = 'https://emerson-11-memories-default-rtdb.firebaseio.com';
const FB_PATH           = `${FB_URL}/officers.json`;
const CLOUDINARY_CLOUD  = 'dbtoadpgi';
const CLOUDINARY_PRESET = 'images memories';

const IMG_MAX_PX    = 1200;   
const IMG_Q_START   = 0.82;   
const IMG_TARGET_KB = 800;    

const BASE_OFFICERS = [
  { id: 'president',    position: 'President'        },
  { id: 'vicepresident',position: 'Vice President'   },
  { id: 'secretary',    position: 'Secretary'        },
  { id: 'treasurer',    position: 'Treasurer'        },
  { id: 'auditor',      position: 'Auditor'          },
  { id: 'pio',          position: 'P.I.O'            },
  { id: 'sgarms',       position: 'Sergeant at Arms' },
  { id: 'muse',         position: 'Muse'             },
  { id: 'escort',       position: 'Escort'           }
];

let isEditing   = false;  
let data        = {};     
let slots       = [];     
let uploadingId = null;   
let lbIndex     = 0;      
let cropActive  = false;  

let _toastTimer = null;
function toast(msg, isErr = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isErr ? ' err' : '');
  void el.offsetWidth; 
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.className = 'toast', 3200);
}

function compress(dataURL) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = function() {
      const scale  = Math.min(IMG_MAX_PX / Math.max(img.width, img.height), 1);
      const W      = Math.round(img.width  * scale);
      const H      = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      canvas.getContext('2d').drawImage(img, 0, 0, W, H);
      let q = IMG_Q_START, out;
      do {
        out = canvas.toDataURL('image/jpeg', q);
        q   = parseFloat((q - 0.05).toFixed(2));
      } while (out.length * 0.75 / 1024 > IMG_TARGET_KB && q > 0.05);
      resolve(out);
    };
    img.onerror = () => resolve(dataURL); 
    img.src = dataURL;
  });
}

async function uploadPhoto(dataURL) {
  try {
    const form = new FormData();
    form.append('file', dataURL);
    form.append('upload_preset', CLOUDINARY_PRESET);
    const r = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, {
      method: 'POST', body: form
    });
    if (!r.ok) throw new Error(`Cloudinary ${r.status}`);
    const json = await r.json();
    return json.secure_url || null;
  } catch (e) {
    console.error('Upload error:', e);
    return null;
  }
}

async function saveAll() {
  try {
    const r = await fetch(FB_PATH, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    return r.ok;
  } catch (e) {
    return false;
  }
}

async function loadAll() {
  showSkeletons(); 

  try {
    const r = await fetch(FB_PATH);
    if (r.ok) {
      const d = await r.json();
      if (d) Object.assign(data, d); 
    }
  } catch (e) {
    console.error('Firebase load error:', e);
    
  }

  buildSlots();
  renderGrid();
}

function showSkeletons() {
  const grid = document.getElementById('officersGrid');
  grid.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const card = document.createElement('div');
    card.className = 'skeleton-card';
    card.innerHTML = `
      <div class="skeleton-photo"></div>
      <div class="skeleton-line" style="width:55%;margin:10px auto 0;"></div>
      <div class="skeleton-line" style="width:75%;margin:6px auto 0;"></div>
      <div class="skeleton-line" style="width:40%;margin:6px auto 0;"></div>
    `;
    grid.appendChild(card);
  }
}

function buildSlots() {
  const customIds = Object.keys(data).filter(id => id.startsWith('custom_'));
  slots = [
    ...BASE_OFFICERS.map(o => ({ id: o.id, position: o.position, custom: false })),
    ...customIds.map(id => ({
      id,
      position: data[id]?.position || 'Member',
      custom: true
    }))
  ];
}

function collectAll() {
  document.querySelectorAll('.officer-card').forEach(card => {
    const id = card.dataset.id;
    if (!data[id]) data[id] = {};
    const nameEl  = card.querySelector('.card-name');
    const posEl   = card.querySelector('.card-position');
    const quoteEl = card.querySelector('.card-quote');
    if (nameEl)  data[id].name     = nameEl.textContent.trim();
    if (posEl)   data[id].position = posEl.textContent.trim();
    if (quoteEl) data[id].quote    = quoteEl.textContent.trim();
  });
}

function renderGrid() {
  const grid = document.getElementById('officersGrid');
  grid.innerHTML = '';
  slots.forEach((slot, i) => grid.appendChild(createCard(slot, i)));
  updateEditState();
}

function createCard(slot, index) {
  const d    = data[slot.id] || {};
  const name = d.name     || 'Add Name';
  const pos  = d.position || slot.position;
  const src  = d.src      || null;

  const card = document.createElement('div');
  card.className              = 'officer-card' + (src ? ' has-photo' : '');
  card.dataset.id             = slot.id;
  card.dataset.index          = index;
  card.style.animationDelay   = `${index * 0.055}s`; 

  card.innerHTML = `
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="card-photo-wrap">
      <img class="card-photo" src="${src || ''}" alt="${name}" style="${src ? '' : 'display:none'}"/>
      <div class="card-photo-placeholder" style="${src ? 'display:none' : ''}">
        <div class="ph-icon">👤</div>
        <div class="ph-text">No Photo</div>
      </div>
      <div class="card-upload-overlay"><span>📷 Upload Photo</span></div>
      <div class="card-zoom-hint">View</div>
      <button class="photo-del-btn" title="Remove photo">✕</button>
    </div>
    <div class="card-info">
      <div class="card-position" contenteditable="false">${pos}</div>
      <div class="card-name"     contenteditable="false">${name}</div>
      <div class="card-quote"    contenteditable="false">${d.quote || ''}</div>
    </div>
    ${slot.custom ? '<button class="card-del-btn" title="Remove">✕</button>' : ''}
  `;

  
  card.querySelector('.card-photo-wrap').addEventListener('click', () => {
    if (isEditing) triggerUpload(slot.id);
    else           openLightbox(index);
  });

  
  card.querySelector('.photo-del-btn').addEventListener('click', async e => {
    e.stopPropagation();
    await deletePhoto(slot.id);
  });

  
  if (slot.custom) {
    card.querySelector('.card-del-btn').addEventListener('click', async e => {
      e.stopPropagation();
      await deleteCard(slot.id);
    });
  }

  return card;
}

function triggerUpload(id) {
  uploadingId = id;
  const input   = document.createElement('input');
  input.type    = 'file';
  input.accept  = 'image/*';
  input.onchange = e => { if (e.target.files[0]) loadForCrop(e.target.files[0]); };
  input.click();
}

function loadForCrop(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('cropImg');
    img.src   = e.target.result;
    img.onload = () => initCropBox();
    document.getElementById('cropOverlay').classList.add('open');
  };
  reader.readAsDataURL(file);
}

async function deletePhoto(id) {
  if (!data[id]) data[id] = {};
  delete data[id].src;
  
  try { await fetch(`${FB_URL}/officers/${id}/src.json`, { method: 'DELETE' }); } catch (e) {}
  await saveAll();
  toast('🗑 Photo removed');
  
  const card = document.querySelector(`[data-id="${id}"]`);
  if (card) {
    const img = card.querySelector('.card-photo');
    const ph  = card.querySelector('.card-photo-placeholder');
    if (img) img.style.display = 'none';
    if (ph)  ph.style.display  = '';
    card.classList.remove('has-photo');
  }
}

async function deleteCard(id) {
  delete data[id];
  try { await fetch(`${FB_URL}/officers/${id}.json`, { method: 'DELETE' }); } catch (e) {}
  await saveAll();
  buildSlots();
  renderGrid();
  toast('🗑 Person removed');
}

function updateEditState() {
  document.querySelectorAll('.officer-card').forEach(card => {
    const nameEl  = card.querySelector('.card-name');
    const posEl   = card.querySelector('.card-position');
    const quoteEl = card.querySelector('.card-quote');
    if (nameEl)  nameEl.contentEditable  = isEditing ? 'true' : 'false';
    if (posEl)   posEl.contentEditable   = isEditing ? 'true' : 'false';
    if (quoteEl) quoteEl.contentEditable = isEditing ? 'true' : 'false';
    card.classList.toggle('edit-mode', isEditing);
  });
}

function openLightbox(index) {
  lbIndex = index;
  updateLightbox(false);
  document.getElementById('lightboxOverlay').classList.add('open');
  document.body.style.overflow = 'hidden'; 
}

function closeLightbox() {
  document.getElementById('lightboxOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function navigateLb(dir) {
  lbIndex = ((lbIndex + dir) % slots.length + slots.length) % slots.length;
  updateLightbox(true);
}

function updateLightbox(animate) {
  const frame = document.getElementById('lbFrame');
  function apply() {
    const slot = slots[lbIndex];
    const d    = data[slot.id] || {};
    const name = d.name     || 'Add Name';
    const pos  = d.position || slot.position;
    const src  = d.src      || null;
    const img  = document.getElementById('lbImg');
    const ph   = document.getElementById('lbPlaceholder');
    if (src) { img.src = src; img.style.display = 'block'; ph.style.display = 'none'; }
    else      { img.style.display = 'none';                ph.style.display = '';     }
    document.getElementById('lbName').textContent    = name;
    document.getElementById('lbPos').textContent     = pos;
    document.getElementById('lbQuote').textContent   = d.quote ? `"${d.quote}"` : '';
    document.getElementById('lbCounter').textContent = `${lbIndex + 1} of ${slots.length}`;
    frame.classList.remove('fading');
  }
  if (animate) { frame.classList.add('fading'); setTimeout(apply, 140); }
  else          apply();
}

document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbPrev').addEventListener('click', () => navigateLb(-1));
document.getElementById('lbNext').addEventListener('click', () => navigateLb(1));
document.getElementById('lightboxOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('lightboxOverlay')) closeLightbox();
});
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightboxOverlay').classList.contains('open')) return;
  if (e.key === 'Escape')     closeLightbox();
  if (e.key === 'ArrowLeft')  navigateLb(-1);
  if (e.key === 'ArrowRight') navigateLb(1);
});
let lbTouchX = null;
document.getElementById('lightboxOverlay').addEventListener('touchstart', e => { lbTouchX = e.touches[0].clientX; });
document.getElementById('lightboxOverlay').addEventListener('touchend', e => {
  if (lbTouchX === null) return;
  const dx = e.changedTouches[0].clientX - lbTouchX;
  if (Math.abs(dx) > 50) navigateLb(dx < 0 ? 1 : -1);
  lbTouchX = null;
});

function $ca() { return document.getElementById('cropArea'); }
function $cb() { return document.getElementById('cropBox'); }

function initCropBox() {
  const area = $ca(), w = area.clientWidth, h = area.clientHeight;
  const size = Math.min(w, h) * 0.72;
  const box  = $cb();
  box.style.left   = ((w - size) / 2) + 'px';
  box.style.top    = ((h - size) / 2) + 'px';
  box.style.width  = size + 'px';
  box.style.height = size + 'px';
}

function readBox() {
  const box = $cb();
  return { x: parseInt(box.style.left), y: parseInt(box.style.top), w: box.offsetWidth, h: box.offsetHeight };
}

let dragStart = null, boxStart = null, resizeDir = null;
function cropDown(dir, cx, cy) {
  cropActive = true; resizeDir = dir;
  dragStart  = { x: cx, y: cy };
  boxStart   = { ...readBox() };
}

function cropMove(cx, cy) {
  if (!cropActive) return;
  const dx = cx - dragStart.x, dy = cy - dragStart.y;
  const area = $ca(), box = $cb();
  const aw = area.clientWidth, ah = area.clientHeight;
  let { x, y, w, h } = boxStart;
  const MIN = 60; 

  if (resizeDir === 'move') {
    
    x = Math.max(0, Math.min(aw - w, x + dx));
    y = Math.max(0, Math.min(ah - h, y + dy));
  } else {
    
    if (resizeDir.includes('e')) { w = Math.max(MIN, Math.min(aw - x, w + dx)); }
    if (resizeDir.includes('s')) { h = Math.max(MIN, Math.min(ah - y, h + dy)); }
    if (resizeDir.includes('w')) { const nw = Math.max(MIN, w - dx); x = Math.min(x + w - MIN, x + dx); w = nw; }
    if (resizeDir.includes('n')) { const nh = Math.max(MIN, h - dy); y = Math.min(y + h - MIN, y + dy); h = nh; }
    x = Math.max(0, x); y = Math.max(0, y);
    w = Math.min(w, aw - x); h = Math.min(h, ah - y);
  }

  box.style.left = x + 'px'; box.style.top = y + 'px';
  box.style.width = w + 'px'; box.style.height = h + 'px';
}

$cb().addEventListener('mousedown',  e => { e.preventDefault(); cropDown('move', e.clientX, e.clientY); });
$cb().addEventListener('touchstart', e => { e.preventDefault(); cropDown('move', e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
document.querySelectorAll('.crop-handle').forEach(h => {
  h.addEventListener('mousedown',  e => { e.preventDefault(); e.stopPropagation(); cropDown(h.dataset.dir, e.clientX, e.clientY); });
  h.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); cropDown(h.dataset.dir, e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
});
document.addEventListener('mousemove', e => cropMove(e.clientX, e.clientY));
document.addEventListener('mouseup',   () => { cropActive = false; });
document.addEventListener('touchmove', e => { if (!cropActive) return; e.preventDefault(); cropMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
document.addEventListener('touchend',  () => { cropActive = false; });

document.getElementById('cropApply').addEventListener('click', async () => {
  const img = document.getElementById('cropImg');
  if (!img.naturalWidth) { toast('Image not ready', true); return; }

  const area = $ca(), b = readBox();
  
  const sx = img.naturalWidth  / area.clientWidth;
  const sy = img.naturalHeight / area.clientHeight;
  const canvas = document.createElement('canvas');
  const sw = Math.round(b.w * sx), sh = Math.round(b.h * sy);
  canvas.width = sw; canvas.height = sh;
  
  canvas.getContext('2d').drawImage(img, Math.round(b.x * sx), Math.round(b.y * sy), sw, sh, 0, 0, sw, sh);

  document.getElementById('cropOverlay').classList.remove('open');
  toast('⏳ Uploading…');

  const compressed = await compress(canvas.toDataURL('image/jpeg', IMG_Q_START));
  const url        = await uploadPhoto(compressed);
  if (!url) { toast('⚠ Upload failed', true); return; }

  
  if (!data[uploadingId]) data[uploadingId] = {};
  data[uploadingId].src = url;
  const ok = await saveAll();
  toast(ok ? '✅ Photo saved!' : '⚠ Save failed', !ok);

  
  const card = document.querySelector(`[data-id="${uploadingId}"]`);
  if (card) {
    let imgEl = card.querySelector('.card-photo');
    const ph  = card.querySelector('.card-photo-placeholder');
    if (!imgEl) {
      imgEl = document.createElement('img');
      imgEl.className = 'card-photo';
      card.querySelector('.card-photo-wrap').insertBefore(imgEl, card.querySelector('.card-photo-wrap').firstChild);
    }
    imgEl.src = url; imgEl.alt = data[uploadingId].name || '';
    imgEl.style.display = 'block';
    if (ph) ph.style.display = 'none';
    card.classList.add('has-photo');
  }
});

document.getElementById('cropCancel').addEventListener('click', () => {
  document.getElementById('cropOverlay').classList.remove('open');
  cropActive = false;
});

document.getElementById('pwOk').addEventListener('click', checkPw);
document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') checkPw(); });
document.getElementById('pwCancel').addEventListener('click', () => {
  document.getElementById('pwOverlay').classList.remove('open');
});

function checkPw() {
  if (document.getElementById('pwInput').value === EDIT_PW) {
    document.getElementById('pwOverlay').classList.remove('open');
    isEditing = true;
    document.getElementById('editToggle').classList.add('active');
    document.getElementById('saveBtn').classList.add('visible');
    document.getElementById('addBtn').classList.add('visible');
    updateEditState();
    toast('✏️ Edit mode on');
  } else {
    document.getElementById('pwError').style.display = 'block';
    document.getElementById('pwInput').value = '';
  }
}

document.getElementById('editToggle').addEventListener('click', () => {
  if (!isEditing) {
    
    document.getElementById('pwInput').value = '';
    document.getElementById('pwError').style.display = 'none';
    document.getElementById('pwOverlay').classList.add('open');
    setTimeout(() => document.getElementById('pwInput').focus(), 100);
  } else {
    
    collectAll();
    saveAll().then(ok => toast(ok ? '✅ Saved!' : '⚠ Save failed', !ok));
    isEditing = false;
    document.getElementById('editToggle').classList.remove('active');
    document.getElementById('saveBtn').classList.remove('visible');
    document.getElementById('addBtn').classList.remove('visible');
    updateEditState();
  }
});

document.getElementById('saveBtn').addEventListener('click', () => {
  collectAll();
  saveAll().then(ok => toast(ok ? '✅ Saved!' : '⚠ Save failed', !ok));
});

document.getElementById('addBtn').addEventListener('click', () => {
  collectAll(); 
  const id = 'custom_' + Date.now();
  data[id] = { name: 'New Person', position: 'Title / Role', src: null };
  buildSlots();
  renderGrid();
  saveAll();
  
  setTimeout(() => {
    const newCard = document.querySelector(`[data-id="${id}"]`);
    if (newCard) newCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 120);
});

loadAll();

</script>
</body>
</html>
