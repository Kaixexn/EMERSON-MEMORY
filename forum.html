<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>G-11 Emerson — Section Reviews</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#050d1f;--navy2:#0a1830;
  --gold:#c9973a;--goldB:#e8b84b;--goldP:#f0d080;--goldD:#7a5a1e;
  --white:#fff;--cream:#f0e6cc;--silver:#b8cce0;
}
html,body{background:var(--navy);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) var(--delay,0s) infinite ease-in-out;}
@keyframes twinkle{0%,100%{opacity:var(--min,.2);}50%{opacity:var(--max,.8);}}
.glow-bg{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(20,60,120,.55) 0%,transparent 70%),
    radial-gradient(ellipse 35% 28% at 20% 100%,rgba(201,151,58,.1) 0%,transparent 60%),
    radial-gradient(ellipse 35% 28% at 80% 100%,rgba(201,151,58,.08) 0%,transparent 60%);}
@keyframes rise{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
@keyframes shimmer{0%{transform:translateX(-100%);}100%{transform:translateX(200%);}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.page{position:relative;z-index:1;min-height:100vh;padding:50px 20px 80px;}

.fw-header{text-align:center;padding:20px 0 40px;animation:rise .8s ease both;}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--gold);font-size:0.82rem;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;margin-bottom:32px;opacity:.8;transition:opacity .2s;}
.back-link:hover{opacity:1;}
.crown{font-size:2rem;display:block;animation:float 4s ease-in-out infinite;margin-bottom:10px;filter:drop-shadow(0 0 12px rgba(201,151,58,.6));}
.fw-header h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,6vw,3.4rem);font-weight:900;background:linear-gradient(135deg,var(--goldP) 0%,var(--gold) 50%,var(--goldD) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.5px;line-height:1.1;}
.fw-header p{margin-top:10px;color:var(--silver);font-size:0.9rem;font-style:italic;letter-spacing:.04em;}

.divider{display:flex;align-items:center;gap:14px;margin:0 auto 32px;max-width:500px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--goldD),transparent);}
.gem{width:8px;height:8px;background:var(--gold);transform:rotate(45deg);flex-shrink:0;box-shadow:0 0 8px var(--gold);}

.auth-section{max-width:700px;margin:0 auto 32px;text-align:center;}
.btn-google{
  display:inline-flex;align-items:center;gap:12px;
  background:#fff;color:#333;
  border:none;border-radius:8px;
  padding:12px 24px;font-size:0.9rem;font-weight:600;
  font-family:'DM Sans',sans-serif;cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
  transition:all .2s;
}
.btn-google:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.4);}
.btn-google img{width:20px;height:20px;}
.user-bar{
  display:none;align-items:center;gap:12px;justify-content:center;
  background:rgba(10,24,48,.6);border:1px solid rgba(201,151,58,.2);
  border-radius:12px;padding:12px 20px;
  backdrop-filter:blur(10px);
}
.user-bar.visible{display:flex;}
.user-avatar{width:40px;height:40px;border-radius:50%;border:2px solid rgba(201,151,58,.4);}
.user-name{font-size:0.9rem;color:var(--goldP);font-weight:500;}
.user-email{font-size:0.75rem;color:var(--silver);opacity:.6;}
.btn-signout{background:transparent;border:1px solid rgba(255,100,100,.3);border-radius:20px;color:rgba(255,100,100,.6);padding:5px 14px;font-size:0.75rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;margin-left:auto;}
.btn-signout:hover{background:rgba(255,60,60,.15);color:#ff6060;border-color:rgba(255,80,80,.6);}

.review-form-card{
  max-width:700px;margin:0 auto 32px;
  background:rgba(10,24,48,.7);
  border:1px solid rgba(201,151,58,.25);
  border-radius:16px;padding:28px;
  backdrop-filter:blur(12px);
  box-shadow:0 8px 40px rgba(0,0,0,.4),inset 0 1px 0 rgba(201,151,58,.1);
  display:none;
  animation:rise .5s ease both;
}
.review-form-card.visible{display:block;}
.form-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--goldP);margin-bottom:20px;}

.star-row{display:flex;align-items:center;gap:6px;margin-bottom:20px;}
.star-label{font-size:0.8rem;color:var(--silver);opacity:.7;margin-right:4px;letter-spacing:.04em;text-transform:uppercase;}
.star-input{display:flex;gap:4px;}
.star-btn{background:none;border:none;font-size:1.6rem;cursor:pointer;color:rgba(201,151,58,.25);transition:color .15s,transform .1s;line-height:1;}
.star-btn:hover,.star-btn.active{color:var(--goldB);}
.star-btn:active{transform:scale(0.9);}

textarea.review-text{
  width:100%;background:rgba(255,255,255,.04);
  border:1px solid rgba(201,151,58,.2);border-radius:8px;
  color:var(--cream);padding:12px 14px;
  font-size:0.9rem;font-family:'DM Sans',sans-serif;
  outline:none;resize:vertical;min-height:100px;
  line-height:1.6;transition:border-color .2s,box-shadow .2s;
}
textarea.review-text:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,151,58,.1);}
textarea.review-text::placeholder{color:rgba(184,204,224,.4);}
.form-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:12px;}
.char-count{font-size:0.78rem;color:var(--silver);opacity:.5;}
.btn-submit{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,var(--gold),var(--goldD));
  color:var(--navy);border:none;border-radius:8px;
  padding:10px 26px;font-size:0.88rem;font-weight:700;
  font-family:'DM Sans',sans-serif;cursor:pointer;
  letter-spacing:.04em;transition:opacity .2s,transform .1s;
}
.btn-submit:hover{opacity:.9;}
.btn-submit:active{transform:scale(0.97);}
.btn-submit:disabled{opacity:.4;cursor:not-allowed;}

.signin-prompt{
  max-width:700px;margin:0 auto 32px;
  background:rgba(10,24,48,.5);
  border:1px solid rgba(201,151,58,.15);
  border-radius:16px;padding:24px;
  text-align:center;
  backdrop-filter:blur(10px);
}
.signin-prompt p{color:var(--silver);font-size:0.88rem;font-style:italic;opacity:.7;}

.stats-bar{
  max-width:700px;margin:0 auto 24px;
  display:flex;align-items:center;gap:16px;flex-wrap:wrap;
}
.avg-rating{
  display:flex;align-items:center;gap:8px;
  background:rgba(201,151,58,.1);border:1px solid rgba(201,151,58,.25);
  border-radius:20px;padding:7px 18px;
}
.avg-stars{font-size:1.2rem;color:var(--goldB);}
.avg-num{font-size:0.9rem;font-weight:600;color:var(--goldP);}
.avg-count{font-size:0.75rem;color:var(--silver);opacity:.6;}
.sort-label{font-size:0.75rem;color:var(--silver);opacity:.5;margin-left:auto;}

.reviews-feed{max-width:700px;margin:0 auto;display:flex;flex-direction:column;gap:16px;}
.review-card{
  background:rgba(10,24,48,.65);
  border:1px solid rgba(201,151,58,.18);
  border-radius:14px;padding:20px 22px;
  backdrop-filter:blur(10px);
  box-shadow:0 4px 24px rgba(0,0,0,.3);
  animation:rise .35s ease both;
  transition:border-color .2s;
}
.review-card:hover{border-color:rgba(201,151,58,.35);}
.review-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.review-avatar{width:44px;height:44px;border-radius:50%;border:2px solid rgba(201,151,58,.3);object-fit:cover;flex-shrink:0;}
.review-meta{flex:1;}
.review-name{font-weight:600;font-size:0.92rem;color:var(--goldP);}
.review-email{font-size:0.72rem;color:var(--silver);opacity:.5;margin-top:1px;}
.review-time{font-size:0.72rem;color:var(--silver);opacity:.5;margin-top:1px;}
.review-stars{display:flex;gap:2px;margin-bottom:10px;}
.review-star{font-size:1rem;color:rgba(201,151,58,.2);}
.review-star.lit{color:var(--goldB);}
.review-body{font-size:0.92rem;line-height:1.65;color:var(--cream);word-break:break-word;white-space:pre-wrap;}
.btn-delete-review{margin-left:auto;background:transparent;border:1px solid rgba(255,80,80,.25);border-radius:20px;color:rgba(255,100,100,.5);padding:4px 10px;font-size:0.72rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;flex-shrink:0;}
.btn-delete-review:hover{background:rgba(255,60,60,.15);border-color:rgba(255,80,80,.6);color:#ff6060;}
.btn-delete-review.hidden{display:none!important;}

.reviews-empty{text-align:center;padding:60px 20px;color:var(--silver);}
.reviews-empty .big-icon{font-size:2.8rem;margin-bottom:14px;opacity:.5;}
.reviews-empty p{font-size:0.9rem;font-style:italic;opacity:.5;}

#forum-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(10,24,48,.95);border:1px solid rgba(201,151,58,.4);color:var(--goldP);padding:10px 22px;border-radius:30px;font-size:0.84rem;letter-spacing:.03em;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;z-index:999;backdrop-filter:blur(10px);white-space:nowrap;}
#forum-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

#adminBtn{position:fixed;bottom:24px;right:24px;z-index:500;background:rgba(10,24,48,.92);border:1px solid rgba(201,151,58,.25);border-radius:20px;color:var(--silver);padding:7px 16px;font-size:0.78rem;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;letter-spacing:.04em;backdrop-filter:blur(8px);}
#adminBtn:hover{border-color:var(--gold);color:var(--goldP);}

@media(max-width:600px){
  .page{padding:32px 12px 80px;}
  .fw-header h1{font-size:clamp(1.6rem,8vw,2.6rem);}
  .review-form-card{padding:16px 14px;}
  .review-card{padding:14px 14px;}
  .review-header{flex-wrap:wrap;gap:8px;}
  .review-meta{min-width:0;}
  .review-name{font-size:0.85rem;word-break:break-word;}
  .review-email{font-size:0.68rem;}
  .btn-delete-review{margin-left:0;align-self:flex-start;}
  .form-bottom{flex-wrap:wrap;gap:10px;}
  .btn-submit{width:100%;text-align:center;}
  .char-count{order:-1;}
  .star-row{flex-wrap:wrap;gap:6px;}
  .star-btn{font-size:1.4rem;}
  .user-bar{flex-wrap:wrap;gap:8px;padding:10px 14px;}
  .btn-signout{margin-left:0;width:100%;}
  .stats-bar{gap:8px;}
  .avg-rating{flex-wrap:wrap;gap:4px;}
  #forum-toast{white-space:normal;text-align:center;max-width:calc(100vw - 32px);font-size:0.8rem;padding:10px 16px;}
  #adminBtn{bottom:16px;right:12px;font-size:0.72rem;padding:6px 12px;}
}
</style>
</head>

    <div class="user-bar" id="userBar">
      <img class="user-avatar" id="userAvatar" src="" alt=""/>
      <div>
        <div class="user-name" id="userName"></div>
        <div class="user-email" id="userEmail"></div>
      </div>
      <button class="btn-signout" id="btnSignOut">Sign out</button>
    </div>
  </div>

  <div class="signin-prompt" id="signinPrompt">
    <div style="font-size:1.8rem;margin-bottom:10px;">✦</div>
    <p>Sign in with your Google account to share your review of G-11 Emerson.</p>
  </div>

  <div class="review-form-card" id="reviewFormCard">
    <div class="form-title">Leave Your Review</div>
    <div class="star-row">
      <span class="star-label">Rating</span>
      <div class="star-input" id="starInput">
        <button class="star-btn" data-val="1">★</button>
        <button class="star-btn" data-val="2">★</button>
        <button class="star-btn" data-val="3">★</button>
        <button class="star-btn" data-val="4">★</button>
        <button class="star-btn" data-val="5">★</button>
      </div>
    </div>
    <textarea class="review-text" id="reviewText" placeholder="Share your thoughts about G-11 Emerson... (max 500 characters)" maxlength="500" oninput="updateCharCount()"></textarea>
    <div class="form-bottom">
      <span class="char-count" id="charCount">0 / 500</span>
      <button class="btn-submit" id="btnSubmit" onclick="submitReview()">Post Review →</button>
    </div>
  </div>

  <div class="stats-bar" id="statsBar" style="display:none;">
    <div class="avg-rating">
      <span class="avg-stars" id="avgStars">★★★★★</span>
      <span class="avg-num" id="avgNum">0.0</span>
      <span class="avg-count" id="avgCount">(0 reviews)</span>
    </div>
  </div>

  <div class="reviews-feed" id="reviewsFeed">
    <div class="reviews-empty">
      <div class="big-icon">✦</div>
      <p>No reviews yet. Be the first to leave one!</p>
    </div>
  </div>

</div>

<button id="adminBtn">🔑 Admin</button>
<div id="forum-toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, remove, onValue, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyB7zr7MkLM1_c5l84pZRZOqiN7hLeEBw-w",
  authDomain: "emerson-review.firebaseapp.com",
  databaseURL: "https://emerson-review-default-rtdb.firebaseio.com",
  projectId: "emerson-review",
  storageBucket: "emerson-review.firebasestorage.app",
  messagingSenderId: "605508679633",
  appId: "1:605508679633:web:ae6025a5530ade33a992f0",
  measurementId: "G-F538L28CLM"
};

const ADMIN_PW   = 'BNSHI2026';
const app        = initializeApp(firebaseConfig);
const db         = getDatabase(app);
const auth       = getAuth(app);
const provider   = new GoogleAuthProvider();
const reviewsRef = ref(db, 'sectionReviews');

let currentUser = null;
let isAdmin     = false;
let selectedRating = 0;

onAuthStateChanged(auth, user => {
  currentUser = user;
  if (user) {
    document.getElementById('signInArea').style.display    = 'none';
    document.getElementById('userBar').classList.add('visible');
    document.getElementById('signinPrompt').style.display  = 'none';
    document.getElementById('reviewFormCard').classList.add('visible');
    document.getElementById('userAvatar').src   = user.photoURL || '';
    document.getElementById('userName').textContent  = user.displayName || 'Anonymous';
    document.getElementById('userEmail').textContent = user.email || '';
  } else {
    document.getElementById('signInArea').style.display    = 'block';
    document.getElementById('userBar').classList.remove('visible');
    document.getElementById('signinPrompt').style.display  = 'block';
    document.getElementById('reviewFormCard').classList.remove('visible');
  }
});

document.getElementById('btnSignIn').addEventListener('click', async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch(e) {
    showToast('Sign in failed. Try again.');
  }
});

document.getElementById('btnSignOut').addEventListener('click', async () => {
  await signOut(auth);
  showToast('Signed out ✦');
});

document.querySelectorAll('.star-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    selectedRating = parseInt(btn.dataset.val);
    document.querySelectorAll('.star-btn').forEach((b, i) => {
      b.classList.toggle('active', i < selectedRating);
    });
  });
  btn.addEventListener('mouseover', () => {
    const hovered = parseInt(btn.dataset.val);
    document.querySelectorAll('.star-btn').forEach((b, i) => {
      b.style.color = i < hovered ? 'var(--goldB)' : '';
    });
  });
  btn.addEventListener('mouseout', () => {
    document.querySelectorAll('.star-btn').forEach((b, i) => {
      b.style.color = '';
    });
  });
});

window.updateCharCount = function() {
  const len = document.getElementById('reviewText').value.length;
  document.getElementById('charCount').textContent = `${len} / 500`;
};

window.submitReview = async function() {
  if (!currentUser) { showToast('Please sign in first.'); return; }
  if (selectedRating === 0) { showToast('Please select a star rating ✦'); return; }
  const text = document.getElementById('reviewText').value.trim();
  if (!text) { showToast('Write something first ✦'); return; }

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true; btn.textContent = 'Posting...';

  try {
    await push(reviewsRef, {
      uid:       currentUser.uid,
      name:      currentUser.displayName || 'Anonymous',
      email:     currentUser.email || '',
      avatar:    currentUser.photoURL || null,
      rating:    selectedRating,
      text:      text,
      timestamp: serverTimestamp()
    });
    document.getElementById('reviewText').value = '';
    document.getElementById('charCount').textContent = '0 / 500';
    selectedRating = 0;
    document.querySelectorAll('.star-btn').forEach(b => b.classList.remove('active'));
    showToast('Review posted ✦');
  } catch(e) {
    console.error(e);
    showToast('Failed to post. Try again.');
  } finally {
    btn.disabled = false; btn.textContent = 'Post Review →';
  }
};

window.deleteReview = async function(id) {
  if (!isAdmin) return;
  if (!confirm('Delete this review?')) return;
  await remove(ref(db, `sectionReviews/${id}`));
  showToast('Review deleted ✦');
};

onValue(reviewsRef, snapshot => {
  const feed = document.getElementById('reviewsFeed');
  const data = snapshot.val();

  if (!data) {
    feed.innerHTML = `<div class="reviews-empty"><div class="big-icon">✦</div><p>No reviews yet. Be the first to leave one!</p></div>`;
    document.getElementById('statsBar').style.display = 'none';
    return;
  }

  const reviews = Object.entries(data)
    .map(([id, v]) => ({ id, ...v }))
    .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

  const avgRating = reviews.reduce((s, r) => s + (r.rating || 0), 0) / reviews.length;
  document.getElementById('avgNum').textContent   = avgRating.toFixed(1);
  document.getElementById('avgCount').textContent = `(${reviews.length} review${reviews.length !== 1 ? 's' : ''})`;
  document.getElementById('avgStars').textContent = renderStarsText(Math.round(avgRating));
  document.getElementById('statsBar').style.display = 'flex';

  feed.innerHTML = reviews.map(r => {
    const stars = [1,2,3,4,5].map(i =>
      `<span class="review-star ${i <= (r.rating||0) ? 'lit' : ''}">★</span>`
    ).join('');
    const timeStr = r.timestamp ? timeAgo(r.timestamp) : 'just now';
    const delBtn = `<button class="btn-delete-review ${isAdmin ? '' : 'hidden'}" onclick="deleteReview('${r.id}')">🗑 delete</button>`;
    const avatar = r.avatar
      ? `<img class="review-avatar" src="${esc(r.avatar)}" alt="avatar"/>`
      : `<div class="review-avatar" style="background:rgba(201,151,58,.1);display:flex;align-items:center;justify-content:center;font-size:1.2rem;">👤</div>`;

    return `<div class="review-card">
      <div class="review-header">
        ${avatar}
        <div class="review-meta">
          <div class="review-name">${esc(r.name || 'Anonymous')}</div>
          <div class="review-email">${esc(r.email || '')}</div>
          <div class="review-time">${timeStr}</div>
        </div>
        ${delBtn}
      </div>
      <div class="review-stars">${stars}</div>
      <div class="review-body">${esc(r.text || '')}</div>
    </div>`;
  }).join('');
});
  
document.getElementById('adminBtn').addEventListener('click', () => {
  if (isAdmin) {
    isAdmin = false;
    document.getElementById('adminBtn').textContent = '🔑 Admin';
    document.querySelectorAll('.btn-delete-review').forEach(b => b.classList.add('hidden'));
    showToast('Admin mode off');
    return;
  }
  const pw = prompt('Enter admin password:');
  if (pw === ADMIN_PW) {
    isAdmin = true;
    document.getElementById('adminBtn').textContent = '🔓 Admin On';
    document.querySelectorAll('.btn-delete-review').forEach(b => b.classList.remove('hidden'));
    showToast('Admin mode on 🔑');
  } else if (pw !== null) {
    showToast('Wrong password ✦');
  }
});

function renderStarsText(n) {
  return '★'.repeat(Math.max(0,n)) + '☆'.repeat(Math.max(0,5-n));
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function timeAgo(ts) {
  const d = Math.floor((Date.now() - ts) / 1000);
  if (d < 60)    return 'just now';
  if (d < 3600)  return `${Math.floor(d/60)}m ago`;
  if (d < 86400) return `${Math.floor(d/3600)}h ago`;
  return `${Math.floor(d/86400)}d ago`;
}
function showToast(msg) {
  const t = document.getElementById('forum-toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>

<script>
(function(){
  const c = document.getElementById('starsContainer');
  for(let i=0;i<65;i++){
    const s = document.createElement('div'); s.className='star';
    const sz = Math.random()*1.8+.4;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*5}s;--min:${.1+Math.random()*.2};--max:${.5+Math.random()*.5};`;
    c.appendChild(s);
  }
})();
</script>
