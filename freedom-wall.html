<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>G-11 Emerson — Freedom Wall</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#050d1f;--navy2:#0a1830;
  --gold:#c9973a;--goldB:#e8b84b;--goldP:#f0d080;--goldD:#7a5a1e;
  --white:#fff;--cream:#f0e6cc;--silver:#b8cce0;
}
html,body{background:var(--navy);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}

/* STARS */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) var(--delay,0s) infinite ease-in-out;}
@keyframes twinkle{0%,100%{opacity:var(--min,.2);}50%{opacity:var(--max,.8);}}

/* GLOW */
.glow-bg{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%,rgba(20,60,120,.55) 0%,transparent 70%),
    radial-gradient(ellipse 35% 28% at 20% 100%,rgba(201,151,58,.1) 0%,transparent 60%),
    radial-gradient(ellipse 35% 28% at 80% 100%,rgba(201,151,58,.08) 0%,transparent 60%);}

/* ANIMATIONS */
@keyframes rise{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
@keyframes shimmer{0%{transform:translateX(-100%);}100%{transform:translateX(200%);}}
@keyframes float{0%,100%{transform:translateY(0px);}50%{transform:translateY(-8px);}}
@keyframes pulse-glow{0%,100%{filter:drop-shadow(0 0 18px rgba(201,151,58,.3));}50%{filter:drop-shadow(0 0 42px rgba(201,151,58,.7));}}

/* PAGE */
.page{position:relative;z-index:1;min-height:100vh;padding:50px 20px 80px;}

/* HEADER */
.fw-header{text-align:center;padding:20px 0 48px;animation:rise .8s ease both;}
.back-link{
  display:inline-flex;align-items:center;gap:6px;
  color:var(--gold);font-size:0.82rem;letter-spacing:.08em;text-transform:uppercase;
  text-decoration:none;margin-bottom:32px;
  opacity:.8;transition:opacity .2s;
}
.back-link:hover{opacity:1;}
.crown{font-size:2rem;display:block;animation:float 4s ease-in-out infinite;margin-bottom:10px;filter:drop-shadow(0 0 12px rgba(201,151,58,.6));}
.fw-header h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(2rem,6vw,3.4rem);
  font-weight:900;
  background:linear-gradient(135deg,var(--goldP) 0%,var(--gold) 50%,var(--goldD) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:-.5px;line-height:1.1;
}
.fw-header p{
  margin-top:10px;color:var(--silver);
  font-size:0.9rem;font-style:italic;letter-spacing:.04em;
}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:14px;margin:0 auto 40px;max-width:500px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--goldD),transparent);}
.gem{width:8px;height:8px;background:var(--gold);transform:rotate(45deg);flex-shrink:0;box-shadow:0 0 8px var(--gold);}

/* FORM CARD */
.fw-form-card{
  max-width:700px;margin:0 auto 40px;
  background:rgba(10,24,48,.7);
  border:1px solid rgba(201,151,58,.25);
  border-radius:16px;
  padding:28px;
  backdrop-filter:blur(12px);
  box-shadow:0 8px 40px rgba(0,0,0,.4),inset 0 1px 0 rgba(201,151,58,.1);
  animation:rise .9s .1s ease both;
}

.fw-form-top{display:flex;gap:16px;align-items:flex-start;margin-bottom:16px;}

/* Avatar */
.avatar-picker{flex-shrink:0;}
.avatar-preview{
  width:56px;height:56px;border-radius:50%;
  border:2px solid rgba(201,151,58,.4);
  background:rgba(201,151,58,.06);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;overflow:hidden;
  transition:border-color .2s,box-shadow .2s;
}
.avatar-preview:hover{border-color:var(--gold);box-shadow:0 0 16px rgba(201,151,58,.3);}
.avatar-preview img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
#avatarInput{display:none;}
.avatar-hint{font-size:0.6rem;color:var(--silver);text-align:center;margin-top:4px;opacity:.7;}

.fw-form-fields{flex:1;}
.fw-form-fields input[type="text"],
textarea#postContent{
  width:100%;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(201,151,58,.2);
  border-radius:8px;
  color:var(--cream);
  padding:10px 14px;
  font-size:0.9rem;
  font-family:'DM Sans',sans-serif;
  outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.fw-form-fields input[type="text"]{margin-bottom:10px;}
.fw-form-fields input[type="text"]:focus,
textarea#postContent:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(201,151,58,.1);
}
.fw-form-fields input::placeholder,
textarea#postContent::placeholder{color:rgba(184,204,224,.4);}
textarea#postContent{resize:vertical;min-height:90px;font-size:0.92rem;line-height:1.55;}

.fw-form-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:12px;}
.char-count{font-size:0.78rem;color:var(--silver);opacity:.6;}

/* POST BUTTON */
.btn-post{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,var(--gold),var(--goldD));
  color:var(--navy);
  border:none;border-radius:8px;
  padding:10px 26px;
  font-size:0.88rem;font-weight:700;
  font-family:'DM Sans',sans-serif;
  cursor:pointer;
  letter-spacing:.04em;
  transition:opacity .2s,transform .1s;
}
.btn-post::after{
  content:'';position:absolute;top:0;left:0;width:40%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
  transform:translateX(-100%);
}
.btn-post:hover{opacity:.9;}
.btn-post:hover::after{animation:shimmer .6s ease;}
.btn-post:active{transform:scale(0.97);}
.btn-post:disabled{opacity:.4;cursor:not-allowed;}

/* POSTS FEED */
.fw-posts{max-width:700px;margin:0 auto;display:flex;flex-direction:column;gap:16px;}

.fw-post{
  background:rgba(10,24,48,.65);
  border:1px solid rgba(201,151,58,.18);
  border-radius:14px;
  padding:20px 22px;
  backdrop-filter:blur(10px);
  box-shadow:0 4px 24px rgba(0,0,0,.3);
  animation:rise .35s ease both;
  transition:border-color .2s;
}
.fw-post:hover{border-color:rgba(201,151,58,.35);}

.post-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.post-avatar{
  width:44px;height:44px;border-radius:50%;
  background:rgba(201,151,58,.08);
  border:2px solid rgba(201,151,58,.3);
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;overflow:hidden;flex-shrink:0;
}
.post-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.post-meta{flex:1;}
.post-name{font-weight:600;font-size:0.92rem;color:var(--goldP);}
.post-time{font-size:0.75rem;color:var(--silver);opacity:.6;margin-top:2px;}

.post-body{
  font-size:0.93rem;line-height:1.65;
  color:var(--cream);word-break:break-word;white-space:pre-wrap;
}

.post-footer{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.react-btn{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(201,151,58,.2);
  border-radius:20px;
  color:var(--silver);
  padding:5px 13px;font-size:0.8rem;
  cursor:pointer;
  font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;gap:5px;
  transition:background .15s,border-color .15s,transform .1s;
}
.react-btn:hover{background:rgba(201,151,58,.1);border-color:var(--gold);color:var(--goldP);}
.react-btn:active{transform:scale(0.94);}
.react-btn.reacted{background:rgba(201,151,58,.15);border-color:var(--gold);color:var(--goldP);cursor:default;pointer-events:none;}

/* DELETE BUTTON */
.btn-delete{
  margin-left:auto;background:transparent;
  border:1px solid rgba(255,80,80,.25);border-radius:20px;
  color:rgba(255,100,100,.5);padding:4px 12px;font-size:0.75rem;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;
}
.btn-delete:hover{background:rgba(255,60,60,.15);border-color:rgba(255,80,80,.6);color:#ff6060;}

/* EMPTY STATE */
.fw-empty{text-align:center;padding:60px 20px;color:var(--silver);}
.fw-empty .big-icon{font-size:2.8rem;margin-bottom:14px;opacity:.6;}
.fw-empty p{font-size:0.9rem;font-style:italic;opacity:.6;}

/* LOADING */
.fw-loading{text-align:center;padding:40px;color:var(--silver);opacity:.5;font-size:0.88rem;font-style:italic;}

/* TOAST */
#fw-toast{
  position:fixed;bottom:30px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:rgba(10,24,48,.95);
  border:1px solid rgba(201,151,58,.4);
  color:var(--goldP);
  padding:10px 24px;border-radius:30px;
  font-size:0.85rem;letter-spacing:.03em;
  opacity:0;pointer-events:none;
  transition:opacity .3s,transform .3s;z-index:999;
  backdrop-filter:blur(10px);
}
#fw-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="stars"><div id="starsContainer"></div></div>
<div class="glow-bg"></div>

<div class="page">

  <!-- HEADER -->
  <div class="fw-header">
    <a href="index.html" class="back-link">← Back to Memory Palace</a>
    <span class="crown">✦</span>
    <h1>Freedom Wall</h1>
    <p>"Leave your words. Let them echo."</p>
  </div>

  <div style="text-align:center;margin-top:-24px;margin-bottom:32px;">
    <button id="adminToggleBtn" onclick="toggleAdmin()" style="
      background:transparent;border:1px solid rgba(201,151,58,.2);
      border-radius:20px;color:var(--silver);padding:5px 16px;
      font-size:0.78rem;font-family:'DM Sans',sans-serif;cursor:pointer;
      transition:all .2s;letter-spacing:.04em;
    ">🔑 Admin</button>
  </div>

  <div class="divider"><div class="gem"></div></div>

  <!-- FORM -->
  <div class="fw-form-card">
    <div class="fw-form-top">
      <div class="avatar-picker">
        <div class="avatar-preview" id="avatarPreview"
             onclick="document.getElementById('avatarInput').click()"
             title="Click to set your avatar">😶</div>
        <div class="avatar-hint">tap for pic</div>
        <input type="file" id="avatarInput" accept="image/*" onchange="handleAvatarChange(event)"/>
      </div>
      <div class="fw-form-fields">
        <input type="text" id="nicknameInput" placeholder="Your nickname (optional)" maxlength="30"/>
        <textarea id="postContent" placeholder="What's on your mind, Emerson?" maxlength="500" oninput="updateCharCount()"></textarea>
      </div>
    </div>
    <div class="fw-form-bottom">
      <span class="char-count" id="charCount">0 / 500</span>
      <button class="btn-post" onclick="submitPost()">Post it →</button>
    </div>
  </div>

  <!-- FEED -->
  <div class="fw-posts" id="postsFeed">
    <div class="fw-loading">Loading the wall...</div>
  </div>

</div>

<div id="fw-toast"></div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, remove, onValue, runTransaction, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    databaseURL: "https://emerson-11-memories-default-rtdb.firebaseio.com"
  };

  const ADMIN_PW = "BNSHI2026";
  let isAdmin = false;

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const wallRef = ref(db, "freedomWall");

  let avatarDataURL = null;

  // ── Admin login toggle ──
  window.toggleAdmin = function() {
    if (isAdmin) {
      isAdmin = false;
      showToast("Admin mode off");
      renderAdminBtn();
      return;
    }
    const pw = prompt("Enter admin password:");
    if (pw === ADMIN_PW) {
      isAdmin = true;
      showToast("Admin mode on 🔑");
    } else if (pw !== null) {
      showToast("Wrong password ✦");
    }
    renderAdminBtn();
  };

  function renderAdminBtn() {
    const btn = document.getElementById("adminToggleBtn");
    if (!btn) return;
    btn.textContent = isAdmin ? "🔓 Admin On" : "🔑 Admin";
    btn.style.borderColor = isAdmin ? "rgba(201,151,58,.6)" : "rgba(201,151,58,.2)";
    btn.style.color = isAdmin ? "var(--goldP)" : "var(--silver)";
  }

  // ── Avatar ──
  window.handleAvatarChange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 200 * 1024) { showToast("Image too large (max 200 KB)"); return; }
    const reader = new FileReader();
    reader.onload = ev => {
      avatarDataURL = ev.target.result;
      document.getElementById("avatarPreview").innerHTML = `<img src="${avatarDataURL}" alt="avatar"/>`;
    };
    reader.readAsDataURL(file);
  };

  // ── Char count ──
  window.updateCharCount = function() {
    const len = document.getElementById("postContent").value.length;
    document.getElementById("charCount").textContent = `${len} / 500`;
  };

  // ── Submit post ──
  window.submitPost = async function() {
    const content  = document.getElementById("postContent").value.trim();
    const nickname = document.getElementById("nicknameInput").value.trim() || "Anonymous";
    if (!content) { showToast("Write something first ✦"); return; }
    const btn = document.querySelector(".btn-post");
    btn.disabled = true; btn.textContent = "Posting...";
    try {
      await push(wallRef, {
        nickname, avatar: avatarDataURL || null, content,
        timestamp: serverTimestamp(),
        reactions: { "❤️": 0, "🔥": 0, "💯": 0, "😂": 0, "👏": 0,"😭": 0 }
      });
      document.getElementById("postContent").value = "";
      document.getElementById("charCount").textContent = "0 / 500";
      avatarDataURL = null;
      document.getElementById("avatarPreview").innerHTML = "😶";
      showToast("Posted ✦");
    } catch(err) {
      console.error(err);
      showToast("Failed to post. Try again.");
    } finally {
      btn.disabled = false; btn.textContent = "Post it →";
    }
  };

  // ── React (one per device per post per emoji) ──
  function getReacted(postId) {
    try { return JSON.parse(localStorage.getItem("fw_reacted_" + postId) || "[]"); }
    catch { return []; }
  }
  function markReacted(postId, emoji) {
    const list = getReacted(postId);
    if (!list.includes(emoji)) {
      list.push(emoji);
      localStorage.setItem("fw_reacted_" + postId, JSON.stringify(list));
    }
  }
  window.reactToPost = function(postId, emoji) {
    const reacted = getReacted(postId);
    if (reacted.includes(emoji)) { showToast("You already reacted with " + emoji); return; }
    const reactionRef = ref(db, `freedomWall/${postId}/reactions/${emoji}`);
    runTransaction(reactionRef, current => (current || 0) + 1);
    markReacted(postId, emoji);
  };

  // ── Delete post (admin only) ──
  window.deletePost = function(postId) {
    if (!isAdmin) return;
    if (!confirm("Delete this post?")) return;
    remove(ref(db, `freedomWall/${postId}`))
      .then(() => showToast("Post deleted ✦"))
      .catch(() => showToast("Failed to delete."));
  };

  // ── Render feed ──
  onValue(wallRef, snapshot => {
    const feed = document.getElementById("postsFeed");
    const data = snapshot.val();
    if (!data) {
      feed.innerHTML = `<div class="fw-empty"><div class="big-icon">✦</div><p>The wall is empty. Be the first to leave a mark.</p></div>`;
      return;
    }
    const posts = Object.entries(data)
      .map(([id, v]) => ({ id, ...v }))
      .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

    feed.innerHTML = posts.map(post => {
      const avatarHTML = post.avatar
        ? `<div class="post-avatar"><img src="${post.avatar}" alt="avatar"/></div>`
        : `<div class="post-avatar">${getInitialEmoji(post.nickname)}</div>`;
      const timeStr = post.timestamp ? timeAgo(post.timestamp) : "just now";
      const reactions = post.reactions || {};
      const reacted = getReacted(post.id);
      const reactionBtns = ["❤️","🔥","💯","😂","👏","😭"].map(e => {
        const done = reacted.includes(e);
        return `<button class="react-btn${done ? " reacted" : ""}" onclick="reactToPost('${post.id}','${e}')">${e} <span>${reactions[e] || 0}</span></button>`;
      }).join("");
      const deleteBtn = isAdmin
        ? `<button class="btn-delete" onclick="deletePost('${post.id}')">🗑 delete</button>`
        : "";
      return `<div class="fw-post">
        <div class="post-header">${avatarHTML}
          <div class="post-meta">
            <div class="post-name">${escapeHTML(post.nickname || "Anonymous")}</div>
            <div class="post-time">${timeStr}</div>
          </div>
          ${deleteBtn}
        </div>
        <div class="post-body">${escapeHTML(post.content)}</div>
        <div class="post-footer">${reactionBtns}</div>
      </div>`;
    }).join("");
  });

  function escapeHTML(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function getInitialEmoji(name) {
    const emojis = ["🌙","⭐","🌟","✨","💫","🌠","🔮","🪐","🌌","💎"];
    let hash = 0;
    for (const c of (name || "")) hash = (hash * 31 + c.charCodeAt(0)) & 0xffff;
    return emojis[hash % emojis.length];
  }
  function timeAgo(ts) {
    const diff = Math.floor((Date.now() - ts) / 1000);
    if (diff < 60) return "just now";
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return `${Math.floor(diff/86400)}d ago`;
  }
  window.showToast = function(msg) {
    const t = document.getElementById("fw-toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2800);
  };
</script>

<!-- STARS -->
<script>
(function(){
  const c = document.getElementById('starsContainer');
  for(let i=0;i<65;i++){
    const s = document.createElement('div'); s.className='star';
    const sz = Math.random()*1.8+.4;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;`
      + `--d:${2+Math.random()*4}s;--delay:${Math.random()*5}s;`
      + `--min:${.1+Math.random()*.2};--max:${.5+Math.random()*.5};`;
    c.appendChild(s);
  }
})();
</script>
</body>
</html>
