<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance</title>
    <style>
        body { 
            text-align: center; 
            padding: 150px; 
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
        }
        h1 { font-size: 50px; color: #2c3e50; }
        body { font-size: 20px; }
        article { display: block; text-align: left; width: 650px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        a { color: #3498db; text-decoration: none; }
        a:hover { color: #2980b9; text-decoration: underline; }
        .icon { font-size: 60px; margin-bottom: 20px; }
    </style>
</head>
<body>
<article>
    <div class="icon">🛠️</div>
    <h1>We’ll be back soon!</h1>
    <div>
        <p>Sorry for the inconvenience, but we’re performing some scheduled maintenance at the moment. We’ll be back online shortly!</p>
        <p>&mdash; The Team</p>
    </div>
</article>
</body>
</html>
