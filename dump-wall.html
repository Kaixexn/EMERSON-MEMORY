<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>G-11 Emerson — Dump Wall</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#050d1f;--navy2:#0a1830;
  --gold:#c9973a;--goldB:#e8b84b;--goldP:#f0d080;--goldD:#7a5a1e;
  --white:#fff;--cream:#f0e6cc;--silver:#b8cce0;
  --radius:14px;
}
html,body{background:var(--navy);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}

/* STARS */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) var(--delay,0s) infinite ease-in-out;}
@keyframes twinkle{0%,100%{opacity:var(--min,.2);}50%{opacity:var(--max,.8);}}

/* SHOOTING STAR */
.shooting-star{
  position:absolute;top:0;left:0;width:2px;height:2px;
  background:linear-gradient(90deg,rgba(255,255,255,0),#fff,var(--goldP));
  border-radius:50%;pointer-events:none;
  animation:shoot var(--sd,1.2s) var(--ss,0s) ease-out both;
  transform-origin:left center;
}
@keyframes shoot{
  0%{opacity:1;transform:translate(var(--sx),var(--sy)) rotate(var(--sa)) scaleX(1);}
  70%{opacity:1;}
  100%{opacity:0;transform:translate(calc(var(--sx) + var(--tx)),calc(var(--sy) + var(--ty))) rotate(var(--sa)) scaleX(30);}
}

.glow-bg{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%,rgba(20,60,120,.55) 0%,transparent 70%),
    radial-gradient(ellipse 35% 28% at 20% 100%,rgba(201,151,58,.1) 0%,transparent 60%),
    radial-gradient(ellipse 35% 28% at 80% 100%,rgba(201,151,58,.08) 0%,transparent 60%);}

/* ANIMATIONS */
@keyframes rise{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
@keyframes shimmer{0%{transform:translateX(-100%);}100%{transform:translateX(200%);}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@keyframes popIn{0%{opacity:0;transform:scale(.7) translateY(16px);}70%{transform:scale(1.04) translateY(-3px);}100%{opacity:1;transform:scale(1) translateY(0);}}
@keyframes heartBeat{0%,100%{transform:scale(1);}30%{transform:scale(1.4);}60%{transform:scale(.95);}}
@keyframes confettiFall{0%{transform:translate(0,0) rotate(0deg);opacity:1;}100%{transform:translate(var(--cx),var(--cy)) rotate(var(--cr));opacity:0;}}
@keyframes newBadgePulse{0%,100%{box-shadow:0 0 0 0 rgba(201,151,58,.4);}50%{box-shadow:0 0 0 6px rgba(201,151,58,0);}}
@keyframes progressSlide{from{width:0%;}to{width:var(--progress-w,0%);}}

/* PAGE */
.page{position:relative;z-index:1;min-height:100vh;padding:50px 20px 80px;}

/* HEADER */
.dw-header{text-align:center;padding:20px 0 40px;animation:rise .8s ease both;}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--gold);font-size:0.82rem;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;margin-bottom:32px;opacity:.8;transition:opacity .2s;}
.back-link:hover{opacity:1;}
.crown{font-size:2rem;display:block;animation:float 4s ease-in-out infinite;margin-bottom:10px;filter:drop-shadow(0 0 12px rgba(201,151,58,.6));}
.dw-header h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,6vw,3.4rem);font-weight:900;background:linear-gradient(135deg,var(--goldP) 0%,var(--gold) 50%,var(--goldD) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.5px;line-height:1.1;}
.dw-header p{margin-top:10px;color:var(--silver);font-size:0.9rem;font-style:italic;letter-spacing:.04em;}

/* PHOTO COUNT BADGE */
.photo-count-wrap{display:flex;justify-content:center;margin-top:14px;}
.photo-count-badge{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(201,151,58,.1);border:1px solid rgba(201,151,58,.3);
  border-radius:20px;padding:5px 16px;
  font-size:0.78rem;color:var(--goldP);letter-spacing:.06em;
}
.photo-count-badge .dot{width:5px;height:5px;border-radius:50%;background:var(--gold);box-shadow:0 0 6px var(--gold);animation:twinkle 1.5s infinite ease-in-out;}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:14px;margin:0 auto 40px;max-width:500px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--goldD),transparent);}
.gem{width:8px;height:8px;background:var(--gold);transform:rotate(45deg);flex-shrink:0;box-shadow:0 0 8px var(--gold);}

/* UPLOAD CARD */
.dw-upload-card{
  max-width:700px;margin:0 auto 40px;
  background:rgba(10,24,48,.7);
  border:1px solid rgba(201,151,58,.25);
  border-radius:var(--radius);padding:28px;
  backdrop-filter:blur(12px);
  box-shadow:0 8px 40px rgba(0,0,0,.4),inset 0 1px 0 rgba(201,151,58,.1);
  animation:rise .9s .1s ease both;
}
@media(max-width:768px){.dw-upload-card{margin:0 10px 30px;padding:20px;}}

/* LIMIT BADGE */
.limit-badge{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.limit-text{font-size:0.78rem;color:var(--silver);opacity:.7;}
.limit-count{font-size:0.78rem;color:var(--goldP);font-weight:600;letter-spacing:.04em;}
.limit-bar{height:3px;background:rgba(255,255,255,.08);border-radius:10px;margin-bottom:20px;overflow:hidden;}
.limit-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--goldB));border-radius:10px;transition:width .4s ease;}

/* NAME INPUT */
.name-input{
  width:100%;background:rgba(255,255,255,.04);
  border:1px solid rgba(201,151,58,.2);border-radius:8px;
  color:var(--cream);padding:10px 14px;font-size:0.9rem;
  font-family:'DM Sans',sans-serif;outline:none;
  transition:border-color .2s;margin-bottom:14px;
}
.name-input:focus{border-color:var(--gold);}
.name-input::placeholder{color:rgba(184,204,224,.35);}

/* DROP ZONE */
.drop-zone{
  border:2px dashed rgba(201,151,58,.3);border-radius:10px;padding:32px 20px;
  text-align:center;cursor:pointer;transition:all .25s;margin-bottom:14px;
  position:relative;overflow:hidden;
}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--gold);background:rgba(201,151,58,.06);transform:scale(1.01);}
.drop-zone .dz-icon{font-size:2.2rem;margin-bottom:8px;display:block;transition:transform .25s;}
.drop-zone:hover .dz-icon{transform:scale(1.2) rotate(-5deg);}
.drop-zone .dz-text{font-size:0.88rem;color:var(--silver);}
.drop-zone .dz-sub{font-size:0.75rem;color:var(--silver);opacity:.5;margin-top:4px;}
#photoFileInput{display:none;}

/* PREVIEW */
#imgPreviewWrap{display:none;margin-bottom:14px;text-align:center;}
#imgPreview{max-width:100%;max-height:260px;border-radius:10px;border:1px solid rgba(201,151,58,.3);object-fit:contain;}
.remove-preview{background:transparent;border:1px solid rgba(255,80,80,.3);border-radius:20px;color:#ff9090;font-size:0.75rem;padding:4px 12px;cursor:pointer;margin-top:8px;font-family:'DM Sans',sans-serif;transition:all .2s;}
.remove-preview:hover{background:rgba(255,60,60,.15);}

/* CAPTION INPUT */
.caption-input{
  width:100%;background:rgba(255,255,255,.04);
  border:1px solid rgba(201,151,58,.2);border-radius:8px;
  color:var(--cream);padding:10px 14px;font-size:0.9rem;
  font-family:'DM Sans',sans-serif;outline:none;
  transition:border-color .2s;margin-bottom:14px;
}
.caption-input:focus{border-color:var(--gold);}
.caption-input::placeholder{color:rgba(184,204,224,.35);}

/* UPLOAD PROGRESS */
.upload-progress-wrap{display:none;margin-bottom:14px;}
.upload-progress-label{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--silver);opacity:.7;margin-bottom:6px;}
.upload-progress-bar{height:4px;background:rgba(255,255,255,.08);border-radius:10px;overflow:hidden;}
.upload-progress-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--gold),var(--goldB));
  border-radius:10px;
  transition:width .3s ease;
}

/* SUBMIT BTN */
.btn-dump{
  position:relative;overflow:hidden;width:100%;
  background:linear-gradient(135deg,var(--gold),var(--goldD));
  color:var(--navy);border:none;border-radius:8px;
  padding:12px;font-size:0.9rem;font-weight:700;
  font-family:'DM Sans',sans-serif;cursor:pointer;
  letter-spacing:.04em;transition:opacity .2s,transform .1s,box-shadow .2s;
}
.btn-dump::after{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);transform:translateX(-100%);}
.btn-dump:hover{opacity:.9;box-shadow:0 6px 24px rgba(201,151,58,.35);}
.btn-dump:hover::after{animation:shimmer .6s ease;}
.btn-dump:active{transform:scale(0.98);}
.btn-dump:disabled{opacity:.4;cursor:not-allowed;}

/* LOCKED STATE */
.locked-msg{
  text-align:center;padding:20px;
  background:rgba(201,151,58,.06);border:1px solid rgba(201,151,58,.2);
  border-radius:10px;color:var(--goldP);font-size:0.88rem;font-style:italic;
}

/* ─── MASONRY GRID ─── */
.dw-grid{position:relative;max-width:1100px;margin:0 auto;padding:0 16px;}
.dw-grid-inner{position:relative;width:100%;}

/* ─── PHOTO CARD ─── */
.dw-card{
  position:absolute;top:0;left:0;
  width:200px;
  opacity:0;
  will-change:transform;
  background:rgba(10,24,48,.65);
  border:1px solid rgba(201,151,58,.18);
  border-radius:12px;overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
  transition:border-color .2s,box-shadow .2s;
  cursor:pointer;
}
.dw-card:hover{
  border-color:rgba(201,151,58,.5);
  box-shadow:0 12px 40px rgba(0,0,0,.6),0 0 0 1px rgba(201,151,58,.2);
  z-index:10;
}
.dw-card.is-laid-out{
  transition:border-color .2s,box-shadow .2s,transform .28s cubic-bezier(.25,.46,.45,.94),opacity .32s ease;
}

/* NEW BADGE */
.new-badge{
  position:absolute;top:8px;left:8px;z-index:5;
  background:linear-gradient(135deg,var(--gold),var(--goldB));
  color:var(--navy);font-size:0.6rem;font-weight:700;
  letter-spacing:.08em;padding:2px 8px;border-radius:20px;
  text-transform:uppercase;
  animation:newBadgePulse 2s infinite;
}

/* ─── IMAGE WRAPPER ─── */
.dw-card-img-wrap{
  position:relative;overflow:hidden;
  aspect-ratio:4/3;
  background:linear-gradient(135deg,rgba(8,20,55,.8) 0%,rgba(15,35,80,.5) 100%);
}
.dw-card-img-wrap::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(201,151,58,.07) 50%,transparent 100%);
  animation:shimmer 2.2s linear infinite;pointer-events:none;
}
.dw-card-img-wrap.img-loaded::after{display:none;}

/* HOVER OVERLAY */
.dw-card-img-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 50%,rgba(5,13,31,.7) 100%);
  opacity:0;transition:opacity .25s;
  display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;
  z-index:3;
}
.dw-card:hover .dw-card-img-overlay{opacity:1;}

/* ─── LAZY IMAGE ─── */
.lazy-img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .4s ease;}
.lazy-img.img-loaded{opacity:1;}

/* ─── CARD FOOTER ─── */
.dw-card-footer{padding:8px 10px 4px;}

.dw-card-uploader{
  font-size:0.72rem;font-weight:600;
  color:var(--goldP);letter-spacing:.03em;
  display:flex;align-items:center;gap:5px;
  margin-bottom:3px;
}
.dw-card-uploader::before{content:'✦';font-size:.5rem;opacity:.6;}

.dw-card-caption{font-size:0.78rem;color:var(--silver);font-style:italic;line-height:1.4;margin-bottom:4px;}
.dw-card-time{font-size:0.65rem;color:var(--silver);opacity:.4;margin-bottom:6px;}

/* REACTIONS */
.dw-card-reactions{
  display:flex;align-items:center;gap:6px;
  padding:0 10px 10px;
}
.reaction-btn{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(255,255,255,.05);border:1px solid rgba(201,151,58,.15);
  border-radius:20px;padding:3px 10px;
  font-size:0.72rem;color:var(--silver);
  cursor:pointer;transition:all .2s;
  font-family:'DM Sans',sans-serif;
  user-select:none;
}
.reaction-btn:hover{background:rgba(201,151,58,.12);border-color:rgba(201,151,58,.35);color:var(--goldP);}
.reaction-btn.reacted{
  background:rgba(201,151,58,.18);border-color:var(--gold);color:var(--goldP);
  animation:heartBeat .4s ease;
}
.reaction-btn .r-emoji{font-size:.85rem;}
.reaction-btn .r-count{font-weight:600;}

/* ─── SKELETON CARDS ─── */
.dw-card.skeleton{pointer-events:none;}
.skeleton-slab{position:relative;overflow:hidden;background:rgba(255,255,255,.05);}
.skeleton-slab::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.07) 50%,transparent 100%);animation:shimmer 1.8s linear infinite;}
.skeleton-line{height:10px;border-radius:4px;margin:9px 12px;background:rgba(255,255,255,.05);position:relative;overflow:hidden;}
.skeleton-line::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.07),transparent);animation:shimmer 1.8s linear infinite .15s;}

/* ADMIN DELETE */
.dw-del-btn{
  position:absolute;top:8px;right:8px;
  background:rgba(200,40,40,.85);border:none;border-radius:50%;
  color:#fff;width:28px;height:28px;font-size:12px;cursor:pointer;
  display:none;align-items:center;justify-content:center;
  transition:background .2s;z-index:10;
}
.dw-del-btn:hover{background:rgb(230,40,40);}
.admin-on .dw-card .dw-del-btn{display:flex;}

/* ADMIN BTN */
#adminBtn{
  position:fixed;bottom:30px;right:24px;z-index:500;
  background:rgba(10,24,48,.92);border:1px solid rgba(201,151,58,.25);
  border-radius:20px;color:var(--silver);padding:7px 16px;font-size:0.78rem;
  font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;letter-spacing:.04em;
  backdrop-filter:blur(8px);
}
#adminBtn:hover{border-color:var(--gold);color:var(--goldP);}

/* EMPTY */
.dw-empty{text-align:center;padding:60px 20px;color:var(--silver);}
.dw-empty .big-icon{font-size:2.8rem;margin-bottom:14px;opacity:.5;}
.dw-empty p{font-size:0.9rem;font-style:italic;opacity:.5;}

/* TOAST */
#dw-toast{
  position:fixed;bottom:30px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:rgba(10,24,48,.95);border:1px solid rgba(201,151,58,.4);
  color:var(--goldP);padding:10px 24px;border-radius:30px;
  font-size:0.85rem;letter-spacing:.03em;
  opacity:0;pointer-events:none;
  transition:opacity .3s,transform .3s;
  z-index:999;backdrop-filter:blur(10px);
}
#dw-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ─── LIGHTBOX ─── */
.lightbox{
  position:fixed;inset:0;z-index:2000;
  background:rgba(5,13,31,.92);
  backdrop-filter:blur(16px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .3s;
}
.lightbox.open{opacity:1;pointer-events:all;}
.lightbox-inner{
  position:relative;max-width:90vw;max-height:90vh;
  display:flex;flex-direction:column;align-items:center;
  animation:popIn .35s ease both;
}
.lightbox img{
  max-width:90vw;max-height:75vh;
  border-radius:12px;
  border:1px solid rgba(201,151,58,.3);
  object-fit:contain;
  box-shadow:0 20px 80px rgba(0,0,0,.7);
}
.lightbox-caption{
  margin-top:14px;font-style:italic;
  color:var(--silver);font-size:0.9rem;text-align:center;max-width:480px;
}
.lightbox-uploader{
  margin-top:6px;font-size:0.78rem;
  color:var(--goldP);letter-spacing:.04em;
}
.lightbox-close{
  position:absolute;top:-14px;right:-14px;
  width:36px;height:36px;border-radius:50%;
  background:rgba(10,24,48,.9);border:1px solid rgba(201,151,58,.3);
  color:var(--silver);font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.lightbox-close:hover{border-color:var(--gold);color:var(--goldP);transform:rotate(90deg);}

/* ─── CONFETTI ─── */
.confetti-piece{
  position:fixed;pointer-events:none;z-index:3000;
  width:8px;height:8px;border-radius:2px;
  animation:confettiFall var(--cd,.8s) var(--cdelay,0s) ease-out both;
}
</style>
</head>
<body>

<div class="stars"><div id="starsContainer"></div></div>
<div class="glow-bg"></div>

<div class="page">

  <!-- HEADER -->
  <div class="dw-header">
    <a href="index.html" class="back-link">← Back to Memory Palace</a>
    <span class="crown">📸</span>
    <h1>Dump Wall</h1>
    <p>"Send your goofy, your candid, your everything."</p>
    <div class="photo-count-wrap">
      <div class="photo-count-badge">
        <span class="dot"></span>
        <span id="totalPhotoCount">0 photos</span>
      </div>
    </div>
  </div>

  <div class="divider"><div class="gem"></div></div>

  <!-- UPLOAD CARD -->
  <div class="dw-upload-card" id="uploadCard">

    <div class="limit-badge">
      <span class="limit-text">Your uploads</span>
      <span class="limit-count" id="limitCount">0 / 10</span>
    </div>
    <div class="limit-bar"><div class="limit-fill" id="limitFill" style="width:0%"></div></div>

    <input type="text" class="name-input" id="nameInput" placeholder="Your name (so people know who dropped it ✦)" maxlength="40"/>

    <div class="drop-zone" id="dropZone">
      <span class="dz-icon">🖼️</span>
      <div class="dz-text">Tap or drag a photo here</div>
      <div class="dz-sub">JPG, PNG, WEBP · max 5MB</div>
    </div>
    <input type="file" id="photoFileInput" accept="image/*"/>

    <div id="imgPreviewWrap">
      <img id="imgPreview" src="" alt="preview"/>
      <br/>
      <button class="remove-preview" id="removePreview">✕ Remove</button>
    </div>

    <input type="text" class="caption-input" id="captionInput" placeholder="Add a caption... (optional)" maxlength="120"/>

    <div class="upload-progress-wrap" id="uploadProgressWrap">
      <div class="upload-progress-label">
        <span>Uploading...</span>
        <span id="uploadProgressPct">0%</span>
      </div>
      <div class="upload-progress-bar">
        <div class="upload-progress-fill" id="uploadProgressFill"></div>
      </div>
    </div>

    <button class="btn-dump" id="submitBtn">Drop it 📸</button>
  </div>

  <!-- FEED -->
  <div class="dw-grid" id="dumpGrid">
    <div class="dw-grid-inner" id="dumpGridInner"></div>
  </div>

</div>

<button id="adminBtn">🔑 Admin</button>
<div id="dw-toast"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-inner">
    <button class="lightbox-close" id="lightboxClose">✕</button>
    <img id="lightboxImg" src="" alt=""/>
    <div class="lightbox-caption" id="lightboxCaption"></div>
    <div class="lightbox-uploader" id="lightboxUploader"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, remove, update, onValue, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = { databaseURL: "https://emerson-11-memories-default-rtdb.firebaseio.com" };

  // Admin password is hashed — never store plaintext secrets in client JS
  // SHA-256 of "BNSHI2026"
  const ADMIN_HASH   = "779541a0509c805f82b31025e9be90667d1810ec68236cc3a9ecf087f457bf67";
  const MAX_PHOTOS   = 10;
  const STORAGE_KEY  = "dumpwall_uploaded";
  const TIME_KEY     = "dumpwall_reset_time";
  const RESET_MS     = 24 * 60 * 60 * 1000;
  const NEW_THRESHOLD_MS = 30 * 60 * 1000; // posts under 30min show "NEW"

  const app     = initializeApp(firebaseConfig);
  const db      = getDatabase(app);
  const wallRef = ref(db, "dumpWall");

  let isAdmin        = false;
  let selectedFile   = null;
  let latestSnapshot = null;

  // Track which posts the current session has already reacted to
  const reactedPosts = new Set(JSON.parse(localStorage.getItem("dumpwall_reacted") || "[]"));

  // ── HASH HELPER ──
  async function sha256(message) {
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
    return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,"0")).join("");
  }

  // ── LIMIT TRACKING ──
  function checkReset() {
    try {
      const lastReset = parseInt(localStorage.getItem(TIME_KEY) || "0");
      if (!lastReset) {
        localStorage.setItem(TIME_KEY, String(Date.now()));
        localStorage.setItem(STORAGE_KEY, "0");
        return;
      }
      if (Date.now() - lastReset >= RESET_MS) {
        localStorage.setItem(STORAGE_KEY, "0");
        localStorage.setItem(TIME_KEY, String(Date.now()));
      }
    } catch(e) {}
  }
  function getUploaded() {
    try { return parseInt(localStorage.getItem(STORAGE_KEY) || "0"); }
    catch { return 0; }
  }
  function incrementUploaded() {
    const n = getUploaded() + 1;
    localStorage.setItem(STORAGE_KEY, String(n));
    if (!localStorage.getItem(TIME_KEY)) localStorage.setItem(TIME_KEY, String(Date.now()));
    updateLimitUI();
  }
  function getTimeUntilReset() {
    try {
      const lastReset = parseInt(localStorage.getItem(TIME_KEY) || "0");
      if (!lastReset) return "";
      const ms = RESET_MS - (Date.now() - lastReset);
      if (ms <= 0) return "";
      const h = Math.floor(ms / 3600000);
      const m = Math.floor((ms % 3600000) / 60000);
      return `Resets in ${h}h ${m}m`;
    } catch { return ""; }
  }
  function updateLimitUI() {
    const n = getUploaded();
    const remaining = Math.max(0, MAX_PHOTOS - n);
    const countEl = document.getElementById("limitCount");
    const fillEl  = document.getElementById("limitFill");
    if (countEl) countEl.textContent = `${n} / ${MAX_PHOTOS}`;
    if (fillEl)  fillEl.style.width  = `${Math.min(100, (n / MAX_PHOTOS) * 100)}%`;

    if (n >= MAX_PHOTOS) {
      const timer = getTimeUntilReset();
      document.getElementById("uploadCard").innerHTML = `
        <div class="locked-msg">
          🔒 You've used all <strong>10</strong> of your uploads.<br/>
          <span style="font-size:0.78rem;opacity:.7;margin-top:6px;display:block;">${timer || "Come back tomorrow for 10 more!"} ✦</span>
        </div>`;
    } else {
      const btn = document.getElementById("submitBtn");
      if (btn) btn.textContent = `Drop it 📸 (${remaining} left)`;
    }
  }

  // ── DROP ZONE ──
  const dropZone = document.getElementById("dropZone");
  const fileInput = document.getElementById("photoFileInput");

  dropZone.addEventListener("click", () => { fileInput.value = ""; fileInput.click(); });
  dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("dragover"); });
  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
  dropZone.addEventListener("drop", e => {
    e.preventDefault(); dropZone.classList.remove("dragover");
    const f = e.dataTransfer.files[0];
    if (f) handleFile(f);
  });
  fileInput.addEventListener("change", e => {
    if (e.target.files && e.target.files[0]) handleFile(e.target.files[0]);
  });
  document.getElementById("removePreview").addEventListener("click", () => {
    selectedFile = null;
    document.getElementById("imgPreviewWrap").style.display = "none";
    document.getElementById("dropZone").style.display = "block";
    fileInput.value = "";
  });

  function handleFile(file) {
    if (!file.type.startsWith("image/")) { showToast("Please select an image file"); return; }
    if (file.size > 5 * 1024 * 1024) { showToast("Image too large (max 5MB)"); return; }
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById("imgPreview").src = e.target.result;
      document.getElementById("imgPreviewWrap").style.display = "block";
      document.getElementById("dropZone").style.display = "none";
    };
    reader.readAsDataURL(file);
  }

  // ── CLOUDINARY UPLOAD with real progress ──
  async function uploadToCloudinary(file) {
    return new Promise((resolve, reject) => {
      const form = new FormData();
      form.append("file", file);
      form.append("upload_preset", "images memories");

      const xhr = new XMLHttpRequest();
      xhr.open("POST", "https://api.cloudinary.com/v1_1/dbtoadpgi/image/upload");

      xhr.upload.addEventListener("progress", e => {
        if (!e.lengthComputable) return;
        const pct = Math.round((e.loaded / e.total) * 90); // cap at 90 — last 10% is server processing
        setUploadProgress(pct);
      });

      xhr.addEventListener("load", () => {
        if (xhr.status >= 200 && xhr.status < 300) {
          const json = JSON.parse(xhr.responseText);
          setUploadProgress(100);
          resolve(json.secure_url || null);
        } else {
          reject(new Error(`Cloudinary ${xhr.status}`));
        }
      });

      xhr.addEventListener("error", () => reject(new Error("Network error")));
      xhr.send(form);
    });
  }

  function setUploadProgress(pct) {
    const wrap = document.getElementById("uploadProgressWrap");
    const fill = document.getElementById("uploadProgressFill");
    const pctEl = document.getElementById("uploadProgressPct");
    if (wrap) wrap.style.display = "block";
    if (fill) fill.style.width = pct + "%";
    if (pctEl) pctEl.textContent = pct + "%";
  }

  function hideUploadProgress() {
    const wrap = document.getElementById("uploadProgressWrap");
    const fill = document.getElementById("uploadProgressFill");
    if (wrap) wrap.style.display = "none";
    if (fill) fill.style.width = "0%";
  }

  // ── SUBMIT ──
  document.getElementById("submitBtn").addEventListener("click", async () => {
    if (getUploaded() >= MAX_PHOTOS) { showToast("You've hit your 10 photo limit 🔒"); return; }
    if (!selectedFile) { showToast("Pick a photo first! 🖼️"); return; }

    const nameVal = (document.getElementById("nameInput").value || "").trim();
    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.textContent = "Uploading...";

    try {
      const caption  = document.getElementById("captionInput").value.trim();
      const url      = await uploadToCloudinary(selectedFile);
      if (!url) throw new Error("No URL returned");

      await push(wallRef, {
        src: url,
        caption: caption || null,
        uploader: nameVal || "Anonymous",
        timestamp: Date.now(), // use client timestamp so sorting works instantly
        hearts: 0,
      });

      incrementUploaded();
      selectedFile = null;
      document.getElementById("imgPreviewWrap").style.display = "none";
      document.getElementById("dropZone").style.display = "block";
      document.getElementById("captionInput").value = "";
      fileInput.value = "";
      hideUploadProgress();
      showToast("Dumped! 📸✦");
      launchConfetti();
    } catch(err) {
      console.error(err);
      hideUploadProgress();
      showToast("Failed to upload. Try again.");
    } finally {
      if (getUploaded() < MAX_PHOTOS) {
        btn.disabled = false;
        btn.textContent = `Drop it 📸 (${MAX_PHOTOS - getUploaded()} left)`;
      }
    }
  });

  // ── REACTIONS ──
  async function toggleReaction(postId, currentCount) {
    const alreadyReacted = reactedPosts.has(postId);
    const newCount = alreadyReacted
      ? Math.max(0, currentCount - 1)
      : currentCount + 1;

    if (alreadyReacted) {
      reactedPosts.delete(postId);
    } else {
      reactedPosts.add(postId);
    }

    localStorage.setItem("dumpwall_reacted", JSON.stringify([...reactedPosts]));
    await update(ref(db, `dumpWall/${postId}`), { hearts: newCount });
  }

  // ── ADMIN ──
  document.getElementById("adminBtn").addEventListener("click", async () => {
    if (isAdmin) {
      isAdmin = false;
      document.body.classList.remove("admin-on");
      document.getElementById("adminBtn").textContent = "🔑 Admin";
      showToast("Admin mode off");
      return;
    }

    const pw = prompt("Enter admin password:");
    if (pw === null) return;

    const hash = await sha256(pw);
    if (hash === ADMIN_HASH) {
      isAdmin = true;
      document.body.classList.add("admin-on");
      document.getElementById("adminBtn").textContent = "🔓 Admin On";
      showToast("Admin mode on 🔑");
      renderGrid();
    } else {
      showToast("Wrong password ✦");
    }
  });

  // ── DELETE ──
  document.getElementById("dumpGridInner").addEventListener("click", e => {
    const delBtn = e.target.closest(".dw-del-btn");
    if (delBtn && isAdmin) {
      const postId = delBtn.dataset.postid;
      if (!confirm("Delete this photo?")) return;
      remove(ref(db, `dumpWall/${postId}`))
        .then(() => showToast("Photo deleted ✦"))
        .catch(() => showToast("Failed to delete."));
    }

    // Reaction click
    const reactionBtn = e.target.closest(".reaction-btn");
    if (reactionBtn) {
      e.stopPropagation();
      const postId = reactionBtn.dataset.postid;
      const count  = parseInt(reactionBtn.dataset.count || "0");
      toggleReaction(postId, count);
      return;
    }

    // Card click → lightbox (but not the delete btn)
    const card = e.target.closest(".dw-card");
    if (card && !delBtn) openLightbox(card);
  });

  // ── LIGHTBOX ──
  function openLightbox(card) {
    const img     = card.querySelector(".lazy-img");
    const caption = card.querySelector(".dw-card-caption");
    const upload  = card.querySelector(".dw-card-uploader");
    if (!img) return;

    const src = img.src || img.dataset.src;
    document.getElementById("lightboxImg").src = getCloudinaryUrl(src, 1200);
    document.getElementById("lightboxCaption").textContent = caption ? caption.textContent : "";
    document.getElementById("lightboxUploader").textContent = upload ? "✦ " + upload.textContent.replace("✦","").trim() : "";
    document.getElementById("lightbox").classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeLightbox() {
    document.getElementById("lightbox").classList.remove("open");
    document.body.style.overflow = "";
    document.getElementById("lightboxImg").src = "";
  }

  document.getElementById("lightboxClose").addEventListener("click", closeLightbox);
  document.getElementById("lightbox").addEventListener("click", e => {
    if (e.target === document.getElementById("lightbox")) closeLightbox();
  });
  document.addEventListener("keydown", e => {
    if (e.key === "Escape") closeLightbox();
  });

  // ── CLOUDINARY URL HELPER ──
  function getCloudinaryUrl(src, width) {
    if (!src || !src.includes("res.cloudinary.com")) return src;
    if (src.includes("/image/upload/w_")) return src;
    return src.replace("/image/upload/", `/image/upload/w_${width},c_limit,q_auto,f_auto/`);
  }

  // ── MASONRY ──
  function getColCount() {
    const w = window.innerWidth;
    if (w >= 1000) return 4;
    if (w >= 640)  return 3;
    return 2;
  }

  let layoutPending = false;
  function scheduleMasonry() {
    if (layoutPending) return;
    layoutPending = true;
    requestAnimationFrame(() => { layoutPending = false; layoutMasonry(); });
  }

  function layoutMasonry() {
    const inner = document.getElementById("dumpGridInner");
    if (!inner) return;
    const cards = Array.from(inner.querySelectorAll(".dw-card"));
    if (!cards.length) return;

    const cols   = getColCount();
    const gap    = 10;
    const totalW = inner.offsetWidth;
    const colW   = Math.floor((totalW - gap * (cols - 1)) / cols);
    const isFirst = !inner.dataset.laidOut;

    for (let i = 0; i < cards.length; i++) cards[i].style.width = colW + "px";

    const heights = new Array(cards.length);
    for (let i = 0; i < cards.length; i++) heights[i] = cards[i].getBoundingClientRect().height;

    const colHeights = new Array(cols).fill(0);
    for (let i = 0; i < cards.length; i++) {
      const card = cards[i];
      const minH = Math.min(...colHeights);
      const col  = colHeights.indexOf(minH);
      const x    = col * (colW + gap);
      const y    = colHeights[col];

      card.style.transform = `translate(${x}px,${y}px)`;

      if (isFirst) {
        card.style.transition = "border-color .2s,box-shadow .2s";
        card.style.opacity    = "1";
        requestAnimationFrame(() => card.classList.add("is-laid-out"));
      }

      colHeights[col] += heights[i] + gap;
    }

    inner.style.height = Math.max(...colHeights) + "px";
    if (isFirst) inner.dataset.laidOut = "1";
  }

  let resizeTimer;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(scheduleMasonry, 150);
  });

  // ── LAZY LOAD ──
  let lazyObserver = null;

  function setupLazyLoad() {
    if (lazyObserver) lazyObserver.disconnect();
    lazyObserver = new IntersectionObserver((entries) => {
      for (const entry of entries) {
        if (!entry.isIntersecting) continue;
        const img = entry.target;
        const src = img.dataset.src;
        if (!src) continue;
        img.src = src;
        if (img.dataset.srcset) {
          img.srcset = img.dataset.srcset;
          img.sizes  =
            "(max-width:640px) calc(50vw - 22px)," +
            "(max-width:1000px) calc(33vw - 16px)," +
            "calc(25vw - 14px)";
        }
        lazyObserver.unobserve(img);
      }
    }, { rootMargin: "300px 0px", threshold: 0 });

    document.querySelectorAll(".lazy-img[data-src]").forEach(img => lazyObserver.observe(img));
  }

  function wireImageEvents(inner) {
    inner.querySelectorAll(".lazy-img").forEach(img => {
      img.addEventListener("load", function onLoad() {
        const wrap = this.closest(".dw-card-img-wrap");
        if (wrap && this.naturalWidth && this.naturalHeight) {
          wrap.style.aspectRatio = `${this.naturalWidth} / ${this.naturalHeight}`;
          wrap.classList.add("img-loaded");
        }
        this.classList.add("img-loaded");
        scheduleMasonry();
        this.removeEventListener("load", onLoad);
      });
      img.addEventListener("error", function onErr() {
        scheduleMasonry();
        this.removeEventListener("error", onErr);
      });
    });
  }

  // ── SKELETONS ──
  function showSkeletons() {
    const inner = document.getElementById("dumpGridInner");
    if (!inner) return;
    const ratios = ["3/4","2/3","1/1","4/5","3/5","2/3","3/4","4/5"];
    inner.dataset.laidOut = "";
    inner.innerHTML = Array.from({ length: 8 }, (_, i) => `
      <div class="dw-card skeleton">
        <div class="skeleton-slab" style="aspect-ratio:${ratios[i % ratios.length]}"></div>
        <div class="skeleton-line" style="width:${55 + (i * 13) % 35}%;margin-top:10px"></div>
        <div class="skeleton-line" style="width:${30 + (i * 7) % 20}%;margin-bottom:12px"></div>
      </div>`).join("");
    scheduleMasonry();
  }

  // ── RENDER GRID ──
  function renderGrid() {
    const inner = document.getElementById("dumpGridInner");
    if (!inner || !latestSnapshot) return;

    const data = latestSnapshot.val();

    // Update total count badge
    const countBadge = document.getElementById("totalPhotoCount");
    if (countBadge) {
      const total = data ? Object.keys(data).length : 0;
      countBadge.textContent = `${total} photo${total !== 1 ? "s" : ""}`;
    }

    if (!data) {
      inner.style.height = "auto";
      inner.dataset.laidOut = "";
      inner.innerHTML = `
        <div style="text-align:center;padding:60px 20px;color:var(--silver);font-style:italic;opacity:.5;position:relative;">
          <div style="font-size:2.8rem;margin-bottom:14px;">📸</div>
          <p>No dumps yet. Be the first to drop a photo!</p>
        </div>`;
      return;
    }

    const posts = Object.entries(data)
      .map(([id, v]) => ({ id, ...v }))
      .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

    inner.dataset.laidOut = "";

    inner.innerHTML = posts.map(post => {
      const thumb    = getCloudinaryUrl(post.src, 400);
      const large    = getCloudinaryUrl(post.src, 800);
      const srcset   = `${thumb} 400w, ${large} 800w`;
      const isNew    = post.timestamp && (Date.now() - post.timestamp) < NEW_THRESHOLD_MS;
      const hearts   = post.hearts || 0;
      const reacted  = reactedPosts.has(post.id);
      const timeStr  = post.timestamp ? timeAgo(post.timestamp) : "just now";

      const newBadge   = isNew ? `<div class="new-badge">New ✦</div>` : "";
      const delBtn     = isAdmin ? `<button class="dw-del-btn" data-postid="${post.id}" title="Delete photo">✕</button>` : "";
      const uploader   = post.uploader ? `<div class="dw-card-uploader">${escapeHTML(post.uploader)}</div>` : "";
      const caption    = post.caption ? `<div class="dw-card-caption">${escapeHTML(post.caption)}</div>` : "";

      return `<div class="dw-card">
        ${newBadge}
        ${delBtn}
        <div class="dw-card-img-wrap">
          <img class="lazy-img" data-src="${thumb}" data-srcset="${srcset}" alt="dump photo"/>
          <div class="dw-card-img-overlay">🔍</div>
        </div>
        <div class="dw-card-footer">
          ${uploader}
          ${caption}
          <div class="dw-card-time">${timeStr}</div>
        </div>
        <div class="dw-card-reactions">
          <button class="reaction-btn ${reacted ? "reacted" : ""}" data-postid="${post.id}" data-count="${hearts}">
            <span class="r-emoji">🤍</span>
            <span class="r-count">${hearts > 0 ? hearts : ""}</span>
          </button>
        </div>
      </div>`;
    }).join("");

    wireImageEvents(inner);
    scheduleMasonry();
    setupLazyLoad();
  }

  onValue(wallRef, snapshot => {
    latestSnapshot = snapshot;
    renderGrid();
  });

  // ── CONFETTI ──
  function launchConfetti() {
    const colors = [
      "#c9973a","#e8b84b","#f0d080","#7a5a1e",
      "#fff","#b8cce0","#f0e6cc"
    ];
    const origin = { x: window.innerWidth / 2, y: window.innerHeight * 0.4 };

    Array.from({ length: 55 }).forEach((_, i) => {
      const el = document.createElement("div");
      el.className = "confetti-piece";
      const angle = (Math.PI * 2 * i) / 55;
      const speed = 120 + Math.random() * 180;
      el.style.cssText = `
        left:${origin.x}px;top:${origin.y}px;
        background:${colors[i % colors.length]};
        border-radius:${Math.random() > .5 ? "50%" : "2px"};
        width:${5 + Math.random() * 6}px;height:${5 + Math.random() * 6}px;
        --cx:${Math.cos(angle) * speed}px;
        --cy:${Math.sin(angle) * speed - 80}px;
        --cr:${Math.random() * 720 - 360}deg;
        --cd:${0.6 + Math.random() * 0.6}s;
        --cdelay:${Math.random() * 0.15}s;
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1400);
    });
  }

  // ── HELPERS ──
  function escapeHTML(str) {
    return String(str)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function timeAgo(ts) {
    const d = Math.floor((Date.now() - ts) / 1000);
    if (d < 60)    return "just now";
    if (d < 3600)  return `${Math.floor(d/60)}m ago`;
    if (d < 86400) return `${Math.floor(d/3600)}h ago`;
    return `${Math.floor(d/86400)}d ago`;
  }
  function showToast(msg) {
    const t = document.getElementById("dw-toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2800);
  }

  // ── INIT ──
  checkReset();
  updateLimitUI();
  showSkeletons();
</script>

<!-- STARS + SHOOTING STARS -->
<script>
(function(){
  const c = document.getElementById("starsContainer");

  // Static stars
  for (let i = 0; i < 65; i++) {
    const s = document.createElement("div");
    s.className = "star";
    const sz = Math.random() * 1.8 + .4;
    s.style.cssText =
      `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;`
      + `--d:${2+Math.random()*4}s;--delay:${Math.random()*5}s;`
      + `--min:${.1+Math.random()*.2};--max:${.5+Math.random()*.5};`;
    c.appendChild(s);
  }

  // Periodic shooting stars
  function spawnShootingStar() {
    const el = document.createElement("div");
    el.className = "shooting-star";
    const startX = Math.random() * window.innerWidth * 0.7;
    const startY = Math.random() * window.innerHeight * 0.4;
    const angle  = 30 + Math.random() * 20; // degrees, mostly right-down
    const dist   = 200 + Math.random() * 300;
    const rad    = angle * Math.PI / 180;
    el.style.cssText =
      `--sx:${startX}px;--sy:${startY}px;--sa:${angle}deg;`
      + `--tx:${Math.cos(rad)*dist}px;--ty:${Math.sin(rad)*dist}px;`
      + `--sd:${0.8+Math.random()*0.5}s;--ss:0s;`;
    c.appendChild(el);
    setTimeout(() => el.remove(), 1600);
  }

  // Fire a few on load, then randomly after
  setTimeout(spawnShootingStar, 800);
  setTimeout(spawnShootingStar, 2200);
  setInterval(() => {
    if (Math.random() > 0.4) spawnShootingStar();
  }, 3500);
})();
</script>
